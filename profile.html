<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EasyPay Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #f4f7f6;
  display: flex;
  justify-content: center;
  padding: 40px 15px;
}

.container {
  width: 100%;
  max-width: 650px;
}

.card {
  background: #fff;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  position: relative;
}

/* Back Button */
.back-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  background: #e9f7ef;
  color: #009f4d;
  border: none;
  padding: 6px 14px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
}

.back-btn:hover {
  opacity: 0.85;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #009f4d;
}

.profile-info {
  text-align: center;
  margin-bottom: 25px;
}

.avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: #e8f5ee;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 700;
  color: #009f4d;
  margin: auto;
  margin-bottom: 15px;
  overflow: hidden;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.form-group {
  margin-bottom: 18px;
}

label {
  font-weight: 600;
  display: block;
  margin-bottom: 6px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

input[readonly] {
  background: #f1f1f1;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}

.primary {
  background: #009f4d;
  color: #fff;
}

.secondary {
  background: #e9f7ef;
  color: #009f4d;
}

.logout {
  background: #ffebee;
  color: #c62828;
}

.action-buttons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.message {
  text-align: center;
  margin-top: 15px;
  font-weight: 600;
}

.success { color: #2e7d32; }
.error { color: #c62828; }

</style>
</head>

<body>

<div class="container">
  <div class="card">

    <!-- Back Button -->
    <button class="back-btn" onclick="location.href='dashboard.html'">
      ← Back
    </button>

    <h2>EasyPay Profile</h2>

    <div class="profile-info">
      <div class="avatar" id="avatar">
        <span id="avatarText">EP</span>
        <img id="avatarImg" style="display:none;">
      </div>
      <p id="usernameDisplay"></p>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" readonly>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email">
    </div>

    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="Leave blank to keep current">
    </div>

    <button class="primary" id="saveBtn">Save Changes</button>

    <div class="action-buttons">
      <button class="secondary" onclick="location.href='deposit.html'">Deposit</button>
      <button class="secondary" onclick="location.href='withdraw.html'">Withdraw</button>
    </div>

    <button class="logout" id="logoutBtn">Logout</button>

    <div class="message" id="message"></div>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  updateEmail,
  updatePassword,
  signOut
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRkip46Ql5KhNfuatWAcAxQzgP5VtQ8UY",
  authDomain: "easypay-6bce8.firebaseapp.com",
  projectId: "easypay-6bce8",
  storageBucket: "easypay-6bce8.appspot.com",
  messagingSenderId: "862671358267",
  appId: "1:862671358267:web:b243c7b69840ef918c8f1e",
  measurementId: "G-2FZKDQ47FZ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const emailInput = document.getElementById("email");
const usernameInput = document.getElementById("username");
const usernameDisplay = document.getElementById("usernameDisplay");
const newPasswordInput = document.getElementById("newPassword");
const saveBtn = document.getElementById("saveBtn");
const logoutBtn = document.getElementById("logoutBtn");
const message = document.getElementById("message");
const avatarText = document.getElementById("avatarText");
const avatarImg = document.getElementById("avatarImg");

let currentUser;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUser = user;
  emailInput.value = user.email;

  const userDoc = await getDoc(doc(db, "users", user.uid));
  const data = userDoc.exists() ? userDoc.data() : {};

  usernameInput.value = data.username || "User";
  usernameDisplay.textContent = data.username || "";

  if (user.photoURL) {
    avatarImg.src = user.photoURL;
    avatarImg.style.display = "block";
    avatarText.style.display = "none";
  } else {
    avatarText.textContent = (data.username || "EP").slice(0,2).toUpperCase();
  }
});

saveBtn.addEventListener("click", async () => {
  message.textContent = "";
  message.className = "message";

  try {

    if (emailInput.value !== currentUser.email) {
      await updateEmail(currentUser, emailInput.value);
    }

    if (newPasswordInput.value) {
      if (newPasswordInput.value.length < 6) {
        throw new Error("Password must be at least 6 characters.");
      }
      await updatePassword(currentUser, newPasswordInput.value);
      newPasswordInput.value = "";
    }

    message.textContent = "Profile updated successfully!";
    message.classList.add("success");

  } catch (error) {
    message.textContent = error.message;
    message.classList.add("error");
  }
});

logoutBtn.addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "login.html";
});

</script>

</body>
</html>
