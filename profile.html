<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Settings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5fdf7;
      color: #333;
      display: flex;
      justify-content: center;
      padding: 40px 0;
    }

    .settings-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 30px;
      width: 100%;
      max-width: 720px;
      box-sizing: border-box;
    }

    /* ✅ HEADER WITH BACK BUTTON */
    .header-bar{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
    }

    .back-btn{
      background:#009f4d;
      color:#fff;
      border:none;
      padding:6px 12px;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
    }

    h2 {
      margin: 0;
      color: #009f4d;
    }

    .top-row {
      display:flex;
      gap:20px;
      align-items:center;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .avatar-wrap {
      width:110px;
      height:110px;
      border-radius:14px;
      background: linear-gradient(135deg,#e9f7ef,#fff);
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
      border:1px solid #e6f7ee;
    }

    .avatar-wrap img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .btn {
      padding:10px 12px;
      border-radius:8px;
      border:0;
      cursor:pointer;
      font-weight:700;
    }

    .btn.primary { background:#009f4d; color:#fff; }
    .btn.ghost { background:#fff; color:#009f4d; border:1px solid #e6f7ee; }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      box-sizing:border-box;
    }

    input[readonly] { background-color: #eee; }

    .message {
      margin-top: 10px;
      font-weight: 600;
      text-align: center;
    }

    .message.error { color: #c62828; }
    .message.success { color: #2e7d32; }
  </style>
</head>

<body>

  <div class="settings-card">

    <!-- ✅ BACK BUTTON ADDED HERE -->
    <div class="header-bar">
      <button class="back-btn" onclick="location.href='dashboard.html'">
        ← Back
      </button>
      <h2>Profile Settings</h2>
    </div>

    <!-- REST OF YOUR PAGE REMAINS UNCHANGED -->

    <div class="top-row">
      <div class="avatar-wrap">
        <img id="avatarImg" src="" alt="avatar" style="display:none">
        <div id="avatarFallback" style="font-weight:800;color:#009f4d;font-size:22px;">EP</div>
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="text" id="email" readonly>
    </div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username">
    </div>

    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="newPassword">
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword">
    </div>

    <div style="display:flex; gap:10px;">
      <button id="saveBtn" class="btn primary">Save Changes</button>
      <button id="logoutBtn" class="btn ghost">Logout</button>
    </div>

    <div id="msg" class="message"></div>

  </div>

</body>
</html>
