<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Settings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5fdf7;
      color: #333;
      display: flex;
      justify-content: center;
      padding: 40px 0;
    }
    .settings-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 30px;
      width: 100%;
      max-width: 720px;
      box-sizing: border-box;
    }

    /* ✅ BACK BUTTON STYLES */
    .header-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .back-btn {
      background: #009f4d;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    h2 {
      margin-top: 0;
      color: #009f4d;
      text-align: center;
    }

    .top-row {
      display:flex;
      gap:20px;
      align-items:center;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .avatar-wrap {
      width:110px;
      height:110px;
      border-radius:14px;
      background: linear-gradient(135deg,#e9f7ef,#fff);
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
      border:1px solid #e6f7ee;
      box-shadow: 0 6px 18px rgba(16,24,40,0.06);
    }

    .avatar-wrap img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .avatar-actions {
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:200px;
    }

    .btn {
      padding:10px 12px;
      border-radius:8px;
      border:0;
      cursor:pointer;
      font-weight:700;
    }

    .btn.primary { background:#009f4d; color:#fff; }
    .btn.ghost { background:#fff; color:#009f4d; border:1px solid #e6f7ee; }

    .note { font-size:13px; color:#666; }

    .form-grid {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
      margin-top:6px;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      box-sizing:border-box;
    }

    input[readonly] { background-color: #eee; }

    hr { margin:18px 0; border:none; border-top:1px solid #f0f4f0; }

    .message { margin-top: 10px; font-weight: 600; text-align: center; }
    .message.error { color: #c62828; }
    .message.success { color: #2e7d32; }

    .gallery {
      margin-top: 14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .thumb {
      width:86px;
      height:86px;
      border-radius:8px;
      overflow:hidden;
      border:2px solid transparent;
      cursor:pointer;
      position:relative;
    }

    .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .thumb.selected { border-color: #009f4d; box-shadow:0 6px 18px rgba(0,0,0,0.06); }

    .thumb .del {
      position:absolute;
      top:6px;
      right:6px;
      background:rgba(0,0,0,0.5);
      color:#fff;
      border-radius:6px;
      padding:2px 6px;
      font-size:12px;
      display:none;
    }

    .thumb:hover .del { display:block; }

    .progress {
      width:100%;
      height:8px;
      background:#eee;
      border-radius:8px;
      overflow:hidden;
      margin-top:8px;
    }

    .progress > i {
      display:block;
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#00b66d,#059c56);
      transition:width .2s linear;
    }

    @media (max-width:720px){
      .form-grid { grid-template-columns: 1fr; }
      .avatar-actions { min-width:0; width:100% }
    }
  </style>
</head>

<body>

    <!-- ✅ BACK BUTTON INSERTED -->
    <div class="header-bar">
      <button class="back-btn" onclick="window.location.href='dashboard.html'">
        ← Back
      </button>
      <h2 style="margin:0;">Profile Settings</h2>
    </div>
