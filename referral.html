<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Referrals – EasyPay</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --green-dark:#06643a;
      --green-med:#00a86b;
      --bg:#f6fdf8;
      --card:#ffffff;
      --muted:#6b6b6b;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Poppins',sans-serif;background:linear-gradient(180deg, #f8fff9 0%, var(--bg) 100%);color:var(--green-dark);min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;background:linear-gradient(90deg,var(--green-med),var(--green-dark));color:#fff}
    .brand{font-weight:700;font-size:1.15rem}
    .ref-box{display:flex;gap:10px;align-items:center}
    .ref-code{background:rgba(255,255,255,0.1);padding:8px 12px;border-radius:8px;font-weight:600}
    .btn{background:#fff;border:none;padding:8px 10px;border-radius:8px;cursor:pointer;font-weight:600}
    .btn.small{padding:6px 8px;font-size:.9rem}
    .back-btn{
      background:#fff;
      border:none;
      padding:6px 12px;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
      margin-right:12px;
    }

    .top-row{display:flex;gap:16px;padding:18px;max-width:1100px;margin:18px auto;width:95%}
    .card{background:var(--card);border-radius:12px;padding:14px;box-shadow:0 6px 18px rgba(6,100,58,0.08);flex:1;display:flex;flex-direction:column;gap:8px}
    .card h3{margin:0;color:var(--green-dark);font-size:0.95rem}
    .big{font-size:1.4rem;font-weight:700;color:var(--green-dark)}
    .muted{color:var(--muted);font-size:0.85rem}
    .controls{display:flex;gap:12px;align-items:center}
    .search{flex:1;min-width:200px}
    .search input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #e6f3ea;background:#fbfffb}
    .tabs{display:flex;gap:12px;justify-content:center;margin:6px auto;max-width:1100px;width:95%}
    .tab{padding:10px 16px;border-radius:999px;cursor:pointer;background:transparent;border:1px solid transparent;font-weight:600;color:var(--green-dark)}
    .tab.active{background:linear-gradient(90deg,var(--green-med),var(--green-dark));color:#fff;box-shadow:0 8px 18px rgba(6,100,58,0.08)}
    .container{max-width:1100px;margin:12px auto;display:flex;flex-direction:column;gap:14px;padding:0 20px 40px;width:95%}
    .table-card{background:var(--card);border-radius:12px;padding:8px;box-shadow:0 10px 30px rgba(6,100,58,0.05);overflow:auto}
    table{width:100%;border-collapse:collapse;min-width:700px}
    thead th{position:sticky;top:0;background:linear-gradient(90deg,var(--green-dark),var(--green-med));color:#fff;padding:12px;text-align:left}
    tbody td{padding:12px;border-bottom:1px solid #f0f6f1}
    tbody tr:hover td{background:#fbfff9}
    .no-data{padding:26px;text-align:center;color:var(--muted)}
    footer{margin-top:auto;padding:14px;text-align:center;background:transparent;color:var(--muted)}
  </style>
</head>
<body>

  <header>
    <div style="display:flex;align-items:center;">
      <button class="back-btn" onclick="location.href='dashboard.html'">← Back</button>
      <div class="brand">EasyPay — My Referrals</div>
    </div>

    <div class="ref-box">
      <div style="text-align:right">
        <div style="font-size:.8rem;color:rgba(255,255,255,0.9)">Your referral code</div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:6px">
          <div id="refCode" class="ref-code">Loading...</div>
          <button id="copyBtn" class="btn small">Copy</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Everything below remains unchanged -->

  <div class="top-row">
    <div class="card">
      <h3>Total Referred</h3>
      <div class="big" id="totalRef">—</div>
      <div class="muted">Users who signed up with your code</div>
    </div>
    <div class="card">
      <h3>Activated</h3>
      <div class="big" id="activatedCount">—</div>
      <div class="muted">Users on premium or gold plan</div>
    </div>
    <div class="card">
      <h3>Search & Filter</h3>
      <div class="controls">
        <div class="search"><input id="searchInput" placeholder="Search username or email"/></div>
        <div style="min-width:110px"><button id="refreshBtn" class="btn">Refresh</button></div>
      </div>
      <div class="muted" style="margin-top:6px">Type to filter the visible table</div>
    </div>
  </div>

  <!-- Tables + Firebase script remain exactly the same as your original -->

</body>
</html>
