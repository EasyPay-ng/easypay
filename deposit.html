<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Submit Deposit</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
:root {
  --primary: #00b66d;
  --bg: #f7fdf8;
  --text: #333;
  --card-bg: #fff;
  --shadow: rgba(0, 102, 51, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding-bottom: 60px;
}

/* CONTAINER */
.container {
  max-width: 520px;
  margin: 20px auto;
  background: var(--card-bg);
  border-radius: 16px;
  box-shadow: 0 6px 18px var(--shadow);
  overflow: hidden;
}

/* HEADER */
.header {
  background: var(--primary);
  color: #fff;
  padding: 1rem;
  font-size: 1.1rem;
  font-weight: 600;
  position: relative;
  text-align: center;
}

.back-btn {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  background: #ffffff33;
  border: none;
  color: white;
  padding: 6px 12px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
}

/* INFO */
.info {
  padding: 1rem;
  background: #f2fff6;
}

.info p {
  font-size: 0.95rem;
  margin: 0.35rem 0;
  color: #2f4f3b;
}

form {
  display: flex;
  flex-direction: column;
  padding: 1rem;
  gap: 1rem;
}

label {
  font-size: 0.9rem;
  font-weight: 500;
  color: #555;
}

input[type="text"],
input[type="number"],
input[type="file"],
.file-drop {
  width: 100%;
  padding: 0.8rem;
  border: 1px solid #e6eef0;
  border-radius: 8px;
  font-size: 1rem;
  background: #fff;
}

input:focus, .file-drop:focus {
  outline: none;
  border-color: var(--primary);
}

.file-drop {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  cursor:pointer;
  background:#fbfffb;
}

.preview {
  margin-top:8px;
  border-radius:8px;
  overflow:hidden;
  max-height:160px;
  display:none;
  align-items:center;
  justify-content:center;
  background:#fafdf9;
  padding:8px;
}

.preview img {
  max-width:100%;
  max-height:160px;
  object-fit:contain;
}

button {
  padding: 0.8rem;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
}

button.secondary {
  background: transparent;
  border: 1px solid #e6eef0;
  color: var(--text);
}

button:disabled {
  background: #cbd5d9;
  cursor: not-allowed;
}

@media (max-width: 420px) {
  .container { margin: 10px; }
  input, button { font-size: 0.95rem; padding: 0.7rem; }
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER WITH BACK BUTTON -->
  <div class="header">
    <button class="back-btn" onclick="location.href='dashboard.html'">← Back</button>
    Submit a Deposit
  </div>

  <div class="info">
    <p>📒 <strong>Account No:</strong> 8125600222</p>
    <p>👤 <strong>Name:</strong> Onyeka Anointed Chidi</p>
    <p>🏦 <strong>Bank:</strong> Opay / Paycom</p>
  </div>

  <form>
    <div>
      <label>Amount</label>
      <input type="number" placeholder="Enter amount (₦)" required />
    </div>

    <div>
      <label>Sender Name</label>
      <input type="text" placeholder="Your name on transfer" required />
    </div>

    <div>
      <label>Proof of Payment</label>
      <input type="file" accept="image/png,image/jpeg" />
    </div>

    <button type="button">Submit Deposit</button>
  </form>

</div>

</body>
</html>
