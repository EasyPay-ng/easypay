<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Submit Deposit</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --primary: #00b66d;
      --bg: #f7fdf8;
      --text: #333;
      --card-bg: #fff;
      --shadow: rgba(0, 102, 51, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 60px;
    }

    .container {
      max-width: 520px;
      margin: 20px auto;
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 6px 18px var(--shadow);
      overflow: hidden;
      position: relative;
    }

    /* BACK BUTTON */
    .back-btn {
      position: absolute;
      top: 15px;
      left: 15px;
      background: #ffffff;
      color: var(--primary);
      border: 1px solid #e6eef0;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(0,0,0,0.05);
    }

    .back-btn:hover {
      opacity: 0.85;
    }

    .header {
      background: var(--primary);
      color: #fff;
      padding: 1rem;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .info {
      padding: 1rem;
      background: #f2fff6;
    }

    .info p {
      font-size: 0.95rem;
      margin: 0.35rem 0;
      color: #2f4f3b;
    }

    form {
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: 1rem;
    }

    label {
      font-size: 0.9rem;
      font-weight: 500;
      color: #555;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"],
    .file-drop {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #e6eef0;
      border-radius: 8px;
      font-size: 1rem;
      background: #fff;
    }

    input:focus, .file-drop:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 6px 18px rgba(0,182,109,0.06);
    }

    .file-drop {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      cursor:pointer;
      background:#fbfffb;
    }

    .hint { font-size: 0.85rem; color: #6b6b6b; }

    .preview {
      margin-top:8px;
      border-radius:8px;
      overflow:hidden;
      max-height:160px;
      display:none;
      align-items:center;
      justify-content:center;
      background:#fafdf9;
      padding:8px;
    }

    .preview img {
      max-width:100%;
      max-height:160px;
      object-fit:contain;
      display:block;
    }

    .btn-row { display:flex; gap:10px; align-items:center; }

    button {
      padding: 0.8rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 18px var(--shadow);
    }

    button.secondary {
      background: transparent;
      border: 1px solid #e6eef0;
      color: var(--text);
      font-weight:600;
    }

    button:disabled {
      background: #cbd5d9;
      cursor: not-allowed;
      box-shadow: none;
    }

    #msg { padding: 0 1rem; font-size: 0.95rem; min-height: 20px; }

    .history { margin: 1rem; padding-bottom: 12px; }

    .history h3 { font-size: 1rem; margin-bottom: 0.5rem; }

    table { width: 100%; border-collapse: collapse; }

    th, td {
      padding: 0.6rem;
      text-align: left;
      border-bottom: 1px solid #eee;
      font-size: 0.9rem;
      vertical-align: middle;
    }

    th {
      background: var(--primary);
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    #loading { text-align: center; padding: 0.5rem; display: none; color: #064; }

    .small { font-size: 0.82rem; color: #6b6b6b; }

  </style>
</head>

<body>
  <div class="container">

    <!-- BACK BUTTON -->
    <button class="back-btn" onclick="location.href='dashboard.html'">
      ← Back
    </button>

    <div class="header">Submit a Deposit</div>
