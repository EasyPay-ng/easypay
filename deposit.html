<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family: 'Poppins', sans-serif;
  background:#f4f6f9;
  margin:0;
  padding:10px;
}

.container{
  max-width:600px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

h2{
  margin-bottom:15px;
}

label{
  display:block;
  margin-top:12px;
  font-weight:500;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:14px;
}

button{
  margin-top:15px;
  width:100%;
  padding:12px;
  background:#16a34a;
  border:none;
  color:#fff;
  font-weight:600;
  border-radius:6px;
  cursor:pointer;
}

button:disabled{
  background:#ccc;
  cursor:not-allowed;
}

.table-wrapper{
  width:100%;
  overflow-x:auto;
  margin-top:20px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:500px; /* ensure horizontal scroll if needed */
}

th, td{
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:14px;
  text-align:left;
}

th{
  background:#16a34a;
  color:white;
  position:sticky;
  top:0;
}

.badge{
  padding:4px 8px;
  border-radius:20px;
  color:white;
  font-size:12px;
  font-weight:600;
}

.approved{background:#16a34a;}
.rejected{background:#dc2626;}
.pending{background:#f59e0b;}

@media(max-width:480px){
  .container{padding:15px;}
  input{font-size:13px;}
  button{font-size:14px;padding:10px;}
  th, td{font-size:12px;}
}
</style>
</head>
<body>

<div class="container">

<h2>Submit Deposit</h2>

<label>Amount</label>
<input type="number" id="amount" placeholder="₦">

<label>Sender Name</label>
<input type="text" id="sender" placeholder="Name on transfer">

<label>Proof of Payment</label>
<input type="file" id="proof">

<label>Reference ID</label>
<input type="text" id="refId" readonly>

<button id="submitBtn" disabled>Submit Deposit</button>

<h3>Deposit Records</h3>
<div class="table-wrapper">
<table>
<thead>
<tr>
<th>Amount</th>
<th>Sender</th>
<th>Ref</th>
<th>Status</th>
<th>Date</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyDRkip46Ql5KhNfuatWAcAxQzgP5VtQ8UY",
  authDomain:"easypay-6bce8.firebaseapp.com",
  projectId:"easypay-6bce8"
});

const auth = firebase.auth();
const db = firebase.firestore();

const submitBtn = document.getElementById("submitBtn");
const historyBody = document.getElementById("history");

let currentUser = null;

// generate ref
function generateRef(){
  return Math.random().toString(36).substring(2,10).toUpperCase();
}
document.getElementById("refId").value = generateRef();

function getBadge(status){
  if(status === "approved") return `<span class="badge approved">approved</span>`;
  if(status === "rejected") return `<span class="badge rejected">rejected</span>`;
  return `<span class="badge pending">pending</span>`;
}

// AUTH CHECK
auth.onAuthStateChanged(user=>{
  if(!user){
    window.location.href="login.html";
    return;
  }
  currentUser = user;
  submitBtn.disabled = false;
  loadHistory();
});

// LOAD HISTORY
async function loadHistory(){
  historyBody.innerHTML = "";

  const snap = await db.collection("deposits")
    .where("userId","==",currentUser.uid)
    .get();

  if(snap.empty){
    historyBody.innerHTML =
      "<tr><td colspan='5'>No deposit records yet</td></tr>";
    return;
  }

  let docs = [];
  snap.forEach(doc => docs.push(doc.data()));

  docs.sort((a,b)=> b.date - a.date);

  docs.forEach(d=>{
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>₦${d.amount}</td>
      <td>${d.senderName}</td>
      <td>${d.refId}</td>
      <td>${getBadge(d.status)}</td>
      <td>${new Date(d.date).toLocaleString()}</td>
    `;
    historyBody.appendChild(row);
  });
}

// SUBMIT
submitBtn.onclick = async ()=>{
  if(!currentUser) return alert("Login required.");

  const amount = document.getElementById("amount").value;
  const sender = document.getElementById("sender").value.trim();
  const proof = document.getElementById("proof").files[0];
  const refId = document.getElementById("refId").value;

  if(!amount || amount <= 0) return alert("Enter valid amount.");
  if(!sender) return alert("Enter sender name.");
  if(!proof) return alert("Upload proof of payment.");

  submitBtn.disabled = true;

  await db.collection("deposits").add({
    userId: currentUser.uid,
    username: currentUser.email,
    amount: parseFloat(amount),
    senderName: sender,
    refId: refId,
    status: "pending",
    processed: false,
    date: Date.now()
  });

  alert("Deposit submitted successfully!");

  document.getElementById("amount").value="";
  document.getElementById("sender").value="";
  document.getElementById("proof").value="";
  document.getElementById("refId").value = generateRef();

  submitBtn.disabled = false;

  loadHistory();
};
</script>

</body>
</html>
