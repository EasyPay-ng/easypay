<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Register – EasyPay</title>

<!-- FAVICON -->
<link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772198392/1000250298_iy0yq0.jpg">

<!-- Google Font (Same as homepage) -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.register-container{
  background:#fff;
  padding:2.5rem;
  border-radius:15px;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
  width:100%;
  max-width:420px;
  text-align:center;
}

.register-logo{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:1rem;
  border:3px solid #00ff99;
}

h2{
  color:#0d1117;
  margin-bottom:1.5rem;
}

.input-group{
  margin-bottom:1rem;
  text-align:left;
}

.input-group label{
  display:block;
  margin-bottom:0.3rem;
  font-weight:500;
  font-size:0.9rem;
}

.input-group input{
  width:100%;
  padding:0.7rem;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:0.9rem;
}

.input-group input:focus{
  border-color:#00ff99;
  outline:none;
}

.terms{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:0.85rem;
  margin-bottom:1rem;
  text-align:left;
}

.terms a{
  color:#00a86b;
  text-decoration:none;
  font-weight:500;
}

.terms a:hover{
  text-decoration:underline;
}

.btn{
  background:#00a86b;
  color:white;
  border:none;
  width:100%;
  padding:0.8rem;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  background:#008f5a;
}

.btn:disabled{
  background:#999;
  cursor:default;
}

.spinner{
  border:3px solid #f3f3f3;
  border-top:3px solid white;
  border-radius:50%;
  width:16px;
  height:16px;
  animation:spin 1s linear infinite;
  display:inline-block;
  vertical-align:middle;
  margin-right:8px;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

.footer{
  margin-top:1rem;
  font-size:0.9rem;
}

.footer a{
  color:#00a86b;
  text-decoration:none;
  font-weight:500;
}

.footer a:hover{
  text-decoration:underline;
}
</style>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>

<body>

<div class="register-container">

<img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772198392/1000250298_iy0yq0.jpg" class="register-logo" alt="EasyPay Logo"/>

<h2>Create Account</h2>

<div class="input-group">
<label>Username</label>
<input type="text" id="username" />
</div>

<div class="input-group">
<label>Full Name</label>
<input type="text" id="fullname" />
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" />
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" />
</div>

<div class="input-group">
<label>Confirm Password</label>
<input type="password" id="confirm-password" />
</div>

<div class="input-group">
<label>Referral (Optional)</label>
<input type="text" id="referral" />
</div>

<div class="terms">
<input type="checkbox" id="agreeTerms">
<label for="agreeTerms">
I agree to the <a href="terms.html" target="_blank">Terms & Conditions</a>
</label>
</div>

<button class="btn" id="registerBtn" onclick="registerUser()">Register</button>

<div class="footer">
<p>Already registered? <a href="login.html">Login now!</a></p>
</div>

</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDRkip46Ql5KhNfuatWAcAxQzgP5VtQ8UY",
  authDomain: "easypay-6bce8.firebaseapp.com",
  projectId: "easypay-6bce8",
  storageBucket: "easypay-6bce8.appspot.com",
  messagingSenderId: "862671358267",
  appId: "1:862671358267:web:b243c7b69840ef918c8f1e",
  measurementId: "G-2FZKDQ47FZ"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Autofill referral from URL
const urlRef = new URLSearchParams(window.location.search).get('ref');
if (urlRef) document.getElementById('referral').value = urlRef;

async function registerUser(){
  const btn = document.getElementById('registerBtn');
  const username = document.getElementById('username').value.trim();
  const fullname = document.getElementById('fullname').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirm-password').value;
  const referral = document.getElementById('referral').value.trim();
  const agreeTerms = document.getElementById('agreeTerms').checked;

  if(!username || !fullname || !email || !password || !confirmPassword){
    alert("Please fill in all fields.");
    return;
  }

  if(password !== confirmPassword){
    alert("Passwords do not match.");
    return;
  }

  if(!agreeTerms){
    alert("You must agree to the Terms & Conditions.");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Registering...';

  try{
    const userCred = await auth.createUserWithEmailAndPassword(email,password);
    await userCred.user.sendEmailVerification();

    await db.collection('users').doc(userCred.user.uid).set({
      username,
      fullname,
      email,
      referral,
      balance:10,
      plan:'basic',
      createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      transactions:[
        {amount:10,type:'Welcome Bonus',date:new Date().toLocaleString()}
      ]
    });

    alert("Registration successful! Verification email sent.");
    window.location.href="login.html";

  }catch(error){
    alert(error.message);
    btn.disabled=false;
    btn.textContent="Register";
  }
}
</script>

</body>
</html>
