<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Register – EasyPay</title>

<!-- FAVICON -->
<link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772198392/1000250298_iy0yq0.jpg">

<!-- Google Font (Same as homepage) -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.register-container{
  background:#fff;
  padding:2.5rem;
  border-radius:15px;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
  width:100%;
  max-width:420px;
  text-align:center;
}

.register-logo{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:1rem;
  border:3px solid #00ff99;
}

h2{
  color:#0d1117;
  margin-bottom:1.5rem;
}

.input-group{
  margin-bottom:1rem;
  text-align:left;
}

.input-group label{
  display:block;
  margin-bottom:0.3rem;
  font-weight:500;
  font-size:0.9rem;
}

.input-group input{
  width:100%;
  padding:0.7rem;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:0.9rem;
}

.input-group input:focus{
  border-color:#00ff99;
  outline:none;
}

.terms{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:0.85rem;
  margin-bottom:1rem;
  text-align:left;
}

.terms a{
  color:#00a86b;
  text-decoration:none;
  font-weight:500;
}

.terms a:hover{
  text-decoration:underline;
}

.btn{
  background:#00a86b;
  color:white;
  border:none;
  width:100%;
  padding:0.8rem;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  background:#008f5a;
}

.btn:disabled{
  background:#999;
  cursor:default;
}

.spinner{
  border:3px solid #f3f3f3;
  border-top:3px solid white;
  border-radius:50%;
  width:16px;
  height:16px;
  animation:spin 1s linear infinite;
  display:inline-block;
  vertical-align:middle;
  margin-right:8px;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

.footer{
  margin-top:1rem;
  font-size:0.9rem;
}

.footer a{
  color:#00a86b;
  text-decoration:none;
  font-weight:500;
}

.footer a:hover{
  text-decoration:underline;
}

/* Floating WhatsApp Button */
.whatsapp-float{
  position:fixed;
  bottom:25px;
  right:25px;
  width:60px;
  height:60px;
  background:#25D366;
  color:#fff;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 4px 15px rgba(37,211,102,0.4);
  cursor:pointer;
  z-index:1000;
  transition:all 0.3s ease;
  text-decoration:none;
}

.whatsapp-float:hover{
  transform:scale(1.1);
  box-shadow:0 6px 20px rgba(37,211,102,0.6);
}

.whatsapp-float svg{
  width:32px;
  height:32px;
  fill:#fff;
}

.whatsapp-tooltip{
  position:fixed;
  bottom:95px;
  right:25px;
  background:#333;
  color:#fff;
  padding:8px 14px;
  border-radius:8px;
  font-size:0.8rem;
  opacity:0;
  visibility:hidden;
  transition:all 0.3s ease;
  white-space:nowrap;
  z-index:1000;
}

.whatsapp-float:hover + .whatsapp-tooltip,
.whatsapp-tooltip:hover{
  opacity:1;
  visibility:visible;
}

.whatsapp-tooltip::after{
  content:'';
  position:absolute;
  bottom:-6px;
  right:20px;
  border-width:6px 6px 0;
  border-style:solid;
  border-color:#333 transparent transparent transparent;
}
</style>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>

<body>

<div class="register-container">

<img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772198392/1000250298_iy0yq0.jpg" class="register-logo" alt="EasyPay Logo"/>

<h2>Create Account</h2>

<div class="input-group">
<label>Username</label>
<input type="text" id="username" />
</div>

<div class="input-group">
<label>Full Name</label>
<input type="text" id="fullname" />
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" />
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" />
</div>

<div class="input-group">
<label>Confirm Password</label>
<input type="password" id="confirm-password" />
</div>

<div class="input-group">
<label>Referral (Optional)</label>
<input type="text" id="referral" />
</div>

<div class="terms">
<input type="checkbox" id="agreeTerms">
<label for="agreeTerms">
I agree to the <a href="terms.html" target="_blank">Terms & Conditions</a>
</label>
</div>

<button class="btn" id="registerBtn" onclick="registerUser()">Register</button>

<div class="footer">
<p>Already registered? <a href="login.html">Login now!</a></p>
</div>

</div>

<!-- Floating WhatsApp Contact -->
<a href="https://wa.me/2348125600222" target="_blank" class="whatsapp-float" aria-label="Contact us on WhatsApp">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>

</a>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDRkip46Ql5KhNfuatWAcAxQzgP5VtQ8UY",
  authDomain: "easypay-6bce8.firebaseapp.com",
  projectId: "easypay-6bce8",
  storageBucket: "easypay-6bce8.appspot.com",
  messagingSenderId: "862671358267",
  appId: "1:862671358267:web:b243c7b69840ef918c8f1e",
  measurementId: "G-2FZKDQ47FZ"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Autofill referral from URL
const urlRef = new URLSearchParams(window.location.search).get('ref');
if (urlRef) document.getElementById('referral').value = urlRef;

async function registerUser(){
  const btn = document.getElementById('registerBtn');
  const username = document.getElementById('username').value.trim();
  const fullname = document.getElementById('fullname').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirm-password').value;
  const referral = document.getElementById('referral').value.trim();
  const agreeTerms = document.getElementById('agreeTerms').checked;

  if(!username || !fullname || !email || !password || !confirmPassword){
    alert("Please fill in all fields.");
    return;
  }

  if(password !== confirmPassword){
    alert("Passwords do not match.");
    return;
  }

  if(!agreeTerms){
    alert("You must agree to the Terms & Conditions.");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Registering...';

  try{
    const userCred = await auth.createUserWithEmailAndPassword(email,password);
    await userCred.user.sendEmailVerification();

    await db.collection('users').doc(userCred.user.uid).set({
      username,
      fullname,
      email,
      referral,
      balance:10,
      plan:'basic',
      createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      transactions:[
        {amount:10,type:'Welcome Bonus',date:new Date().toLocaleString()}
      ]
    });

    alert("Registration successful! Verification email sent.");
    window.location.href="login.html";

  }catch(error){
    alert(error.message);
    btn.disabled=false;
    btn.textContent="Register";
  }
}
</script>

</body>
</html>
