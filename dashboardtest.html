<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EasyPay Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- FAVICON -->
<link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772198392/1000250298_iy0yq0.jpg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#f4fbf6;
  padding-bottom:90px;
}
header{
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.username{
  font-weight:600;
  color:#009f4d;
}
.hero{
  margin:20px;
  background:linear-gradient(135deg,#008f45,#00c261,#00e676);
  color:white;
  padding:28px;
  border-radius:20px;
}
.hero h1{
  margin:10px 0 5px 0;
  font-size:30px;
}
.carousel{
  margin:20px;
  border-radius:18px;
  overflow:hidden;
}
.carousel img{
  width:100%;
  height:200px;
  object-fit:cover;
  display:none;
}
.carousel img.active{ display:block; }
.quote{
  text-align:center;
  padding:15px;
  background:white;
}
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  margin:20px;
}
.card{
  background:white;
  padding:18px;
  border-radius:14px;
}
.progress-bar{
  height:10px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
  margin-top:10px;
}
.progress{
  height:100%;
  background:#009f4d;
}
.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:15px 0;
}
.bottom-nav div{
  text-align:center;
  font-size:12px;
  color:#777;
  cursor:pointer;
}
.bottom-nav .active{
  color:#009f4d;
  font-weight:600;
}
</style>
</head>
<body>

<header>
  <h2>EasyPay</h2>
  <div class="username" id="username">Loading...</div>
</header>

<div class="hero">
  <small>Available Balance</small>
  <h1>₦<span id="balance">0</span></h1>
  <div id="planInfo">No Active Plan</div>
</div>

<div class="carousel">
  <img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772404909/what-is-investment_bznczq.webp" class="active">
  <img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772404909/ROI-return-on-investment-1024x626_apfrbs.jpg">
  <img src="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1772404908/Return-on-Investment-Formula-ROI_zxmjno.jpg">
</div>

<div class="quote" id="quoteText">
  "Invest today for a stronger tomorrow."
</div>

<div class="stats" id="investmentSection"></div>

<div class="bottom-nav">
  <div onclick="location.href='referral.html'">🧑‍🤝‍🧑<br>refer</div>
  <div onclick="location.href='invest.html'">📦<br>Plans</div>
  <div onclick="location.href='deposit.html'">💳<br>Deposit</div>
  <div onclick="location.href='profile.html'">👤<br>Profile</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, deleteField, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRkip46Ql5KhNfuatWAcAxQzgP5VtQ8UY",
  authDomain: "easypay-6bce8.firebaseapp.com",
  projectId: "easypay-6bce8",
  storageBucket: "easypay-6bce8.firebasestorage.app",
  messagingSenderId: "862671358267",
  appId: "1:862671358267:web:b243c7b69840ef918c8f1e",
  measurementId: "G-2FZKDQ47FZ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

async function initAuth(){
  await setPersistence(auth, browserLocalPersistence);

  onAuthStateChanged(auth, async (user)=>{
    if(!user){
      window.location.href="login.html";
      return;
    }

    document.getElementById("username").innerText =
      "Hi, " + (user.displayName || "User");

    const userRef = doc(db,"users",user.uid);
    const snap = await getDoc(userRef);
    if(!snap.exists()) return;

    let data = snap.data();

    if(data.investment){
      await handleDailyCredit(userRef, data);
      const updatedSnap = await getDoc(userRef);
      data = updatedSnap.data();
    }

    updateUI(data);
  });
}

initAuth();

/* AUTO DAILY CREDIT */
async function handleDailyCredit(userRef, data){

  const inv = data.investment;

  const now = new Date();
  const start = new Date(inv.startDate.seconds * 1000);

  const lastCredit = inv.lastCreditDate
    ? new Date(inv.lastCreditDate.seconds * 1000)
    : start;

  const totalDays = Math.floor((now - start)/(1000*60*60*24));
  const creditedDays = Math.floor((lastCredit - start)/(1000*60*60*24));

  let daysToCredit = totalDays - creditedDays;

  if(daysToCredit <= 0) return;

  if(totalDays >= inv.duration){
    daysToCredit = inv.duration - creditedDays;
  }

  const amount = daysToCredit * inv.dailyEarning;

  if(amount > 0){
    await updateDoc(userRef,{
      balance: (data.balance || 0) + amount,
      "investment.lastCreditDate": serverTimestamp()
    });
  }

  if(totalDays >= inv.duration){
    await updateDoc(userRef,{
      investment: deleteField(),
      activePlan: null
    });
  }
}

/* UPDATE UI */
function updateUI(data){

  document.getElementById("balance").innerText =
    (data.balance || 0).toLocaleString();

  if(!data.investment){
    document.getElementById("planInfo").innerText="No Active Plan";
    document.getElementById("investmentSection").innerHTML="";
    return;
  }

  const inv = data.investment;
  const now = new Date();
  const start = new Date(inv.startDate.seconds * 1000);
  const daysPassed = Math.floor((now - start)/(1000*60*60*24));
  const progress = Math.min((daysPassed / inv.duration)*100,100);

  document.getElementById("planInfo").innerText =
    inv.planName + " Plan";

  document.getElementById("investmentSection").innerHTML = `
    <div class="card">
      <strong>Daily Earnings</strong><br>
      ₦${inv.dailyEarning.toLocaleString()}
    </div>
    <div class="card">
      <strong>Days Passed</strong><br>
      ${Math.min(daysPassed, inv.duration)} / ${inv.duration}
      <div class="progress-bar">
        <div class="progress" style="width:${progress}%"></div>
      </div>
    </div>
    <div class="card">
      <strong>Total Expected</strong><br>
      ₦${inv.totalExpected.toLocaleString()}
    </div>
  `;
}

/* CAROUSEL */
const images = document.querySelectorAll(".carousel img");
let i = 0;
setInterval(()=>{
  images[i].classList.remove("active");
  i = (i+1)%images.length;
  images[i].classList.add("active");
},3000);

</script>

</body>
</html>
