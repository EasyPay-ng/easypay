<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRkip46Ql5KhNfuatWAcAxQzgP5VtQ8UY",
  authDomain: "easypay-6bce8.firebaseapp.com",
  projectId: "easypay-6bce8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let userData;

// ✅ ADDED: 2 New Plans (Starter ₦10,000 and Basic ₦20,000)
const plans = [
  { name:"Starter", class:"starter", amount:10000, daily:600 },
  { name:"Basic", class:"basic", amount:20000, daily:1200 },
  { name:"Premium", class:"premium", amount:50000, daily:3350 },
  { name:"Gold", class:"gold", amount:100000, daily:6700 },
  { name:"Elite", class:"elite", amount:300000, daily:20035 },
  { name:"Diamond", class:"diamond", amount:500000, daily:33370 },
  { name:"Platinum", class:"platinum", amount:1000000, daily:66740 }
];

function createPlans(){
  const container = document.getElementById("plansContainer");
  container.innerHTML = "";

  plans.forEach(plan => {

    const dailyROI = ((plan.daily / plan.amount) * 100).toFixed(2);
    const total30 = plan.daily * 30;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="badge ${plan.class}">${plan.name}</div>
      <h3>${plan.name} Plan</h3>
      <div class="price">₦${plan.amount.toLocaleString()}</div>
      <div class="desc">
        ✔ Earn ₦${plan.daily.toLocaleString()} Daily<br>
        ✔ ${dailyROI}% Daily ROI<br>
        ✔ ₦${total30.toLocaleString()} in 30 Days<br>
        ✔ Capital Locked for 30 Days<br>
        ✔ One Active Investment Allowed
      </div>
      <button onclick="invest('${plan.name}', ${plan.amount})">
        Invest in ${plan.name}
      </button>
    `;

    container.appendChild(card);
  });
}

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href="login.html";
    return;
  }

  currentUser = user;

  const snap = await getDoc(doc(db,"users",user.uid));
  if(!snap.exists()) return;

  userData = snap.data();
  updateUI();
});

function updateUI(){

  document.getElementById("balance").innerText =
    (userData.balance || 0).toLocaleString();

  document.getElementById("planStatus").innerText =
    userData.activePlan || "None";

  if(userData.activePlan){
    document.querySelectorAll("button").forEach(btn=>{
      if(!btn.classList.contains("back-btn")){
        btn.disabled = true;
        btn.innerText = "Investment Active";
      }
    });
  }
}

window.invest = async function(planName, amount){

  if(userData.activePlan){
    alert("You already have an active investment.");
    return;
  }

  if(userData.balance < amount){
    alert("Insufficient balance.");
    return;
  }

  const selected = plans.find(p=>p.amount===amount);

  if(!confirm(
    `Confirm Investment\n\n`+
    `Plan: ${planName}\n`+
    `Amount: ₦${amount.toLocaleString()}\n`+
    `Daily Earnings: ₦${selected.daily.toLocaleString()}\n`+
    `Duration: 30 Days`
  )) return;

  const userRef = doc(db,"users",currentUser.uid);

  await updateDoc(userRef,{
    balance: userData.balance - amount,
    activePlan: planName,
    investment:{
      planName: planName,
      amount: amount,
      dailyEarning: selected.daily,
      startDate: serverTimestamp(),
      duration: 30,
      totalExpected: selected.daily * 30
    }
  });

  alert("Investment successful!");

  const updated = await getDoc(userRef);
  userData = updated.data();
  updateUI();
};

createPlans();
</script>

</body>
</html>
