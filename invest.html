<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EasyPay Investment Plans</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins;
  margin:0;
  background:#f4fbf6;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#009f4d,#00c261);
  color:white;
  padding:18px 20px;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  align-items:center;
}

.balance-box{
  background:#ffffff22;
  padding:8px 14px;
  border-radius:999px;
  margin-left:10px;
  font-weight:600;
  backdrop-filter:blur(6px);
}

/* PAGE */
.page{
  max-width:1200px;
  margin:40px auto;
  padding:20px;
}

.plans{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
  transition:0.3s ease;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 40px rgba(0,0,0,0.08);
}

.badge{
  position:absolute;
  top:15px;
  right:15px;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  color:white;
}

/* Plan Colors */
.premium { background:#009f4d; }
.gold { background:#d4af37; }
.elite { background:#3f51b5; }
.diamond { background:#00bcd4; }
.platinum { background:#7e57c2; }

.card h3{
  margin:0;
  font-weight:700;
  font-size:20px;
}

.price{
  font-size:24px;
  font-weight:700;
  margin:12px 0;
  color:#009f4d;
}

.desc{
  font-size:14px;
  line-height:1.7;
  margin-bottom:18px;
  color:#444;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#009f4d,#00c261);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  opacity:0.9;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}
</style>
</head>

<body>

<header>
  <div style="font-weight:700;font-size:18px;">EasyPay Investment Plans</div>
  <div>
    <span class="balance-box">Balance: ₦<span id="balance">0</span></span>
    <span class="balance-box">Active Plan: <span id="planStatus">None</span></span>
  </div>
</header>

<main class="page">
  <div class="plans" id="plansContainer"></div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRkip46Ql5KhNfuatWAcAxQzgP5VtQ8UY",
  authDomain: "easypay-6bce8.firebaseapp.com",
  projectId: "easypay-6bce8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let userData;

const plans = [
  { name:"Premium", class:"premium", amount:50000, daily:3350 },
  { name:"Gold", class:"gold", amount:100000, daily:6700 },
  { name:"Elite", class:"elite", amount:300000, daily:20035 },
  { name:"Diamond", class:"diamond", amount:500000, daily:33370 },
  { name:"Platinum", class:"platinum", amount:1000000, daily:66740 }
];

function createPlans(){
  const container = document.getElementById("plansContainer");
  container.innerHTML = "";

  plans.forEach(plan => {

    const dailyROI = ((plan.daily / plan.amount) * 100).toFixed(2);
    const total30 = plan.daily * 30;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="badge ${plan.class}">${plan.name}</div>
      <h3>${plan.name} Plan</h3>
      <div class="price">₦${plan.amount.toLocaleString()}</div>
      <div class="desc">
        ✔ Earn ₦${plan.daily.toLocaleString()} Daily<br>
        ✔ ${dailyROI}% Daily ROI<br>
        ✔ ₦${total30.toLocaleString()} in 30 Days<br>
        ✔ Capital Locked for 30 Days<br>
        ✔ One Active Investment Allowed
      </div>
      <button onclick="invest('${plan.name}', ${plan.amount})">
        Invest in ${plan.name}
      </button>
    `;

    container.appendChild(card);
  });
}

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    alert("Please login first.");
    window.location.href = "login.html";
    return;
  }

  currentUser = user;
  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);

  if (!snap.exists()) {
    alert("User data not found.");
    return;
  }

  userData = snap.data();
  updateUI();
});

function updateUI(){
  document.getElementById("balance").innerText =
    (userData.balance || 0).toLocaleString();

  document.getElementById("planStatus").innerText =
    userData.activePlan ? userData.activePlan : "None";

  if(userData.activePlan){
    document.querySelectorAll("button").forEach(btn=>{
      btn.disabled = true;
      btn.innerText = "Investment Active";
    });
  }
}

window.invest = async function(planName, amount){

  if(userData.activePlan){
    alert("You already have an active investment.");
    return;
  }

  if(userData.balance < amount){
    alert("Insufficient balance.");
    return;
  }

  const selected = plans.find(p => p.amount === amount);
  const dailyROI = ((selected.daily / selected.amount) * 100).toFixed(2);

  if(!confirm(
    `Confirm Investment\n\n` +
    `Plan: ${planName}\n` +
    `Amount: ₦${amount.toLocaleString()}\n` +
    `Daily Earnings: ₦${selected.daily.toLocaleString()}\n` +
    `Daily ROI: ${dailyROI}%\n` +
    `Duration: 30 Days`
  )) return;

  const userRef = doc(db, "users", currentUser.uid);

  await updateDoc(userRef,{
    balance: userData.balance - amount,
    activePlan: planName,
    investment:{
      planName: planName,
      amount: amount,
      dailyEarning: selected.daily,
      startDate: serverTimestamp(),
      duration: 30,
      totalExpected: selected.daily * 30
    }
  });

  alert("Investment successful!");

  const updated = await getDoc(userRef);
  userData = updated.data();
  updateUI();
};

createPlans();
</script>

</body>
</html>
