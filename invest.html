<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="icon" type="image/png" sizes="32x32"
href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1752962852/file_00000000401861f8bf6acb6/favicon.png">
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EasyPay Investment Plans</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{ box-sizing:border-box; }

body{
  font-family:Poppins;
  margin:0;
  background:#f4fbf6;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#009f4d,#00c261);
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  position:sticky;
  top:0;
  z-index:100;
}

.header-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.back-btn{
  background:#ffffff33;
  border:none;
  color:white;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.balance-box{
  background:#ffffff22;
  padding:6px 12px;
  border-radius:999px;
  font-weight:600;
  font-size:13px;
  margin-top:5px;
  backdrop-filter:blur(6px);
}

/* PAGE */
.page{
  max-width:1200px;
  margin:20px auto;
  padding:15px;
}

.plans{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:white;
  padding:22px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
  transition:0.3s ease;
  position:relative;
}

.card:hover{
  transform:translateY(-5px);
}

.badge{
  position:absolute;
  top:15px;
  right:15px;
  padding:6px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  color:white;
}

/* Plan Colors */
.premium { background:#009f4d; }
.gold { background:#d4af37; }
.elite { background:#3f51b5; }
.diamond { background:#00bcd4; }
.platinum { background:#7e57c2; }

.card h3{
  margin:0;
  font-size:18px;
}

.price{
  font-size:22px;
  font-weight:700;
  margin:12px 0;
  color:#009f4d;
}

.desc{
  font-size:14px;
  line-height:1.6;
  margin-bottom:18px;
  color:#444;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#009f4d,#00c261);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

@media(max-width:600px){
  header{
    flex-direction:column;
    align-items:flex-start;
    gap:8px;
  }
  .balance-box{
    font-size:12px;
  }
  .card{
    padding:18px;
  }
  .price{
    font-size:20px;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-left">
    <!-- ✅ FIXED BACK BUTTON -->
    <button class="back-btn" onclick="location.href='dashboard.html'">
      ← Back
    </button>

    <div style="font-weight:700;font-size:16px;">
      EasyPay Investment Plans
    </div>
  </div>

  <div>
    <span class="balance-box">
      Balance: ₦<span id="balance">0</span>
    </span>
    <span class="balance-box">
      Active Plan: <span id="planStatus">None</span>
    </span>
  </div>
</header>

<main class="page">
  <div class="plans" id="plansContainer"></div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRkip46Ql5KhNfuatWAcAxQzgP5VtQ8UY",
  authDomain: "easypay-6bce8.firebaseapp.com",
  projectId: "easypay-6bce8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let userData;

const plans = [
  { name:"Premium", class:"premium", amount:50000, daily:3350 },
  { name:"Gold", class:"gold", amount:100000, daily:6700 },
  { name:"Elite", class:"elite", amount:300000, daily:20035 },
  { name:"Diamond", class:"diamond", amount:500000, daily:33370 },
  { name:"Platinum", class:"platinum", amount:1000000, daily:66740 }
];

function createPlans(){
  const container = document.getElementById("plansContainer");
  container.innerHTML = "";

  plans.forEach(plan => {

    const dailyROI = ((plan.daily / plan.amount) * 100).toFixed(2);
    const total30 = plan.daily * 30;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="badge ${plan.class}">${plan.name}</div>
      <h3>${plan.name} Plan</h3>
      <div class="price">₦${plan.amount.toLocaleString()}</div>
      <div class="desc">
        ✔ Earn ₦${plan.daily.toLocaleString()} Daily<br>
        ✔ ${dailyROI}% Daily ROI<br>
        ✔ ₦${total30.toLocaleString()} in 30 Days<br>
        ✔ Capital Locked for 30 Days<br>
        ✔ One Active Investment Allowed
      </div>
      <button onclick="invest('${plan.name}', ${plan.amount})">
        Invest in ${plan.name}
      </button>
    `;

    container.appendChild(card);
  });
}

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href="login.html";
    return;
  }

  currentUser = user;

  const snap = await getDoc(doc(db,"users",user.uid));
  if(!snap.exists()) return;

  userData = snap.data();
  updateUI();
});

function updateUI(){

  document.getElementById("balance").innerText =
    (userData.balance || 0).toLocaleString();

  document.getElementById("planStatus").innerText =
    userData.activePlan || "None";

  if(userData.activePlan){
    document.querySelectorAll("button").forEach(btn=>{
      if(!btn.classList.contains("back-btn")){
        btn.disabled = true;
        btn.innerText = "Investment Active";
      }
    });
  }
}

window.invest = async function(planName, amount){

  if(userData.activePlan){
    alert("You already have an active investment.");
    return;
  }

  if(userData.balance < amount){
    alert("Insufficient balance.");
    return;
  }

  const selected = plans.find(p=>p.amount===amount);

  if(!confirm(
    `Confirm Investment\n\n`+
    `Plan: ${planName}\n`+
    `Amount: ₦${amount.toLocaleString()}\n`+
    `Daily Earnings: ₦${selected.daily.toLocaleString()}\n`+
    `Duration: 30 Days`
  )) return;

  const userRef = doc(db,"users",currentUser.uid);

  await updateDoc(userRef,{
    balance: userData.balance - amount,
    activePlan: planName,
    investment:{
      planName: planName,
      amount: amount,
      dailyEarning: selected.daily,
      startDate: serverTimestamp(),
      duration: 30,
      totalExpected: selected.daily * 30
    }
  });

  alert("Investment successful!");

  const updated = await getDoc(userRef);
  userData = updated.data();
  updateUI();
};

createPlans();
</script>

</body>
</html>
