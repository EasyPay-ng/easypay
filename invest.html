<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EasyPay Investment Plans</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins;
  margin:0;
  background:#f4fbf6;
}

header{
  background:#009f4d;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
}

.balance-box{
  background:#ffffff22;
  padding:8px 14px;
  border-radius:999px;
  margin-left:10px;
  font-weight:600;
}

.page{
  max-width:1200px;
  margin:30px auto;
  padding:20px;
}

.plans{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.card h3{
  margin:0;
}

.price{
  font-size:22px;
  font-weight:700;
  margin:10px 0;
}

.desc{
  font-size:14px;
  line-height:1.6;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#009f4d;
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}
</style>
</head>

<body>

<header>
  <div>EasyPay Investment Plans</div>
  <div>
    <span class="balance-box">Balance: ₦<span id="balance">0</span></span>
    <span class="balance-box">Active Plan: <span id="planStatus">None</span></span>
  </div>
</header>

<main class="page">
<div class="plans" id="plansContainer"></div>
</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRkip46Ql5KhNfuatWAcAxQzgP5VtQ8UY",
  authDomain: "easypay-6bce8.firebaseapp.com",
  projectId: "easypay-6bce8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let userData;

const plans = [
  { amount:50000, daily:3350 },
  { amount:100000, daily:6700 },
  { amount:300000, daily:20035 },
  { amount:500000, daily:33370 },
  { amount:1000000, daily:66740 }
];

function createPlans(){
  const container = document.getElementById("plansContainer");
  container.innerHTML = "";

  plans.forEach(plan => {

    const dailyROI = ((plan.daily / plan.amount) * 100).toFixed(2);
    const total30 = plan.daily * 30;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>₦${plan.amount.toLocaleString()} Plan</h3>
      <div class="price">Earn ₦${plan.daily.toLocaleString()} Daily</div>
      <div class="desc">
        ✔ ${dailyROI}% Daily ROI<br>
        ✔ ₦${total30.toLocaleString()} in 30 Days<br>
        ✔ Capital Locked for 30 Days<br>
        ✔ One Active Investment Allowed
      </div>
      <button onclick="invest(${plan.amount})" id="btn${plan.amount}">
        Invest ₦${plan.amount.toLocaleString()}
      </button>
    `;

    container.appendChild(card);
  });
}

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    alert("Please login first.");
    window.location.href = "login.html";
    return;
  }

  currentUser = user;

  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);

  if (!snap.exists()) {
    alert("User data not found.");
    return;
  }

  userData = snap.data();
  updateUI();
});

function updateUI(){

  document.getElementById("balance").innerText =
    userData.balance.toLocaleString();

  document.getElementById("planStatus").innerText =
    userData.activePlan ? userData.activePlan : "None";

  if(userData.activePlan){
    document.querySelectorAll("button").forEach(btn=>{
      btn.disabled = true;
      btn.innerText = "Investment Active";
    });
  }
}

window.invest = async function(amount){

  if(userData.activePlan){
    alert("You already have an active investment.");
    return;
  }

  if(userData.balance < amount){
    alert("Insufficient balance.");
    return;
  }

  const selected = plans.find(p => p.amount === amount);
  const dailyROI = ((selected.daily / selected.amount) * 100).toFixed(2);

  if(!confirm(
    `Confirm Investment\n\n` +
    `Amount: ₦${amount.toLocaleString()}\n` +
    `Daily Earnings: ₦${selected.daily.toLocaleString()}\n` +
    `Daily ROI: ${dailyROI}%\n` +
    `Duration: 30 Days`
  )) return;

  const userRef = doc(db, "users", currentUser.uid);

  await updateDoc(userRef,{
    balance: userData.balance - amount,
    activePlan: `₦${amount.toLocaleString()} Plan`,
    investment:{
      amount: amount,
      dailyEarning: selected.daily,
      startDate: serverTimestamp(),
      duration: 30,
      totalExpected: selected.daily * 30
    }
  });

  alert("Investment successful!");

  const updated = await getDoc(userRef);
  userData = updated.data();
  updateUI();
};

createPlans();

</script>

</body>
</html>
