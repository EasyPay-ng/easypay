<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f0f4f8;
  padding-bottom: 90px;
  color: #1a1a2e;
}

/* ========== HEADER ========== */
header {
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.06);
}

header h2 {
  font-size: 24px;
  font-weight: 700;
  background: linear-gradient(135deg, #008f45, #00c261);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.user-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #008f45, #00c261);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 600;
  font-size: 16px;
}

.username {
  font-weight: 600;
  color: #1a1a2e;
  font-size: 14px;
}

/* ========== HERO / BALANCE CARD ========== */
.hero {
  margin: 20px;
  background: linear-gradient(135deg, #008f45, #00b853, #00e676);
  color: white;
  padding: 32px 28px;
  border-radius: 24px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0, 143, 69, 0.3);
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 200px;
  height: 200px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -30%;
  left: -10%;
  width: 150px;
  height: 150px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
}

.hero small {
  font-size: 13px;
  opacity: 0.9;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}

.hero h1 {
  margin: 8px 0 6px 0;
  font-size: 36px;
  font-weight: 700;
  position: relative;
  z-index: 1;
}

#planInfo {
  font-size: 13px;
  opacity: 0.85;
  background: rgba(255,255,255,0.15);
  display: inline-block;
  padding: 6px 14px;
  border-radius: 20px;
  margin-top: 8px;
  position: relative;
  z-index: 1;
}

/* ========== QUICK ACTIONS ========== */
.quick-actions {
  margin: 20px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.action-btn {
  background: white;
  border: none;
  border-radius: 16px;
  padding: 16px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.06);
  transition: all 0.3s ease;
  font-family: 'Poppins', sans-serif;
}

.action-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

.action-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.action-btn span {
  font-size: 12px;
  font-weight: 500;
  color: #444;
}

/* ========== CAROUSEL ========== */
.carousel {
  margin: 20px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(0,0,0,0.1);
  position: relative;
}

.carousel img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: none;
  transition: opacity 0.5s ease;
}

.carousel img.active {
  display: block;
}

.carousel-dots {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
}

.carousel-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  transition: all 0.3s;
}

.carousel-dot.active {
  background: white;
  width: 20px;
  border-radius: 4px;
}

/* ========== QUOTE ========== */
.quote {
  margin: 0 20px 20px;
  text-align: center;
  padding: 18px 24px;
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.04);
  position: relative;
}

.quote::before {
  content: '"';
  position: absolute;
  top: -5px;
  left: 15px;
  font-size: 40px;
  color: #00c261;
  opacity: 0.2;
  font-family: Georgia, serif;
}

.quote p {
  font-size: 14px;
  color: #555;
  font-style: italic;
  line-height: 1.6;
}

/* ========== STATS / INVESTMENT CARDS ========== */
.section-title {
  margin: 24px 20px 12px;
  font-size: 16px;
  font-weight: 600;
  color: #1a1a2e;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::before {
  content: '';
  width: 4px;
  height: 18px;
  background: linear-gradient(180deg, #008f45, #00e676);
  border-radius: 2px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  margin: 0 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  transition: all 0.3s ease;
  border: 1px solid rgba(0,0,0,0.03);
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.card-label {
  font-size: 12px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.card-value {
  font-size: 20px;
  font-weight: 700;
  color: #1a1a2e;
}

.card-value.green {
  color: #008f45;
}

.progress-bar {
  height: 8px;
  background: #e8f5e9;
  border-radius: 20px;
  overflow: hidden;
  margin-top: 12px;
}

.progress {
  height: 100%;
  background: linear-gradient(90deg, #008f45, #00e676);
  border-radius: 20px;
  transition: width 0.5s ease;
}

.days-text {
  font-size: 12px;
  color: #666;
  margin-top: 8px;
  font-weight: 500;
}

/* ========== NO PLAN STATE ========== */
.no-plan {
  margin: 0 20px;
  background: white;
  border-radius: 18px;
  padding: 40px 24px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

.no-plan-icon {
  font-size: 48px;
  margin-bottom: 12px;
}

.no-plan h3 {
  font-size: 18px;
  color: #1a1a2e;
  margin-bottom: 8px;
}

.no-plan p {
  font-size: 14px;
  color: #888;
  margin-bottom: 20px;
}

.no-plan-btn {
  background: linear-gradient(135deg, #008f45, #00c261);
  color: white;
  border: none;
  padding: 12px 32px;
  border-radius: 12px;
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s;
}

.no-plan-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 25px rgba(0, 143, 69, 0.3);
}

/* ========== BOTTOM NAV ========== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 12px 0 20px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  border-radius: 24px 24px 0 0;
  z-index: 100;
}

.bottom-nav div {
  text-align: center;
  font-size: 11px;
  color: #aaa;
  cursor: pointer;
  padding: 6px 16px;
  border-radius: 12px;
  transition: all 0.3s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.bottom-nav div .nav-icon {
  font-size: 22px;
  transition: all 0.3s;
}

.bottom-nav div.active {
  color: #008f45;
  font-weight: 600;
  background: rgba(0, 143, 69, 0.08);
}

.bottom-nav div.active .nav-icon {
  transform: scale(1.1);
}

/* ========== FLOATING WHATSAPP ========== */
.whatsapp-float {
  position: fixed;
  bottom: 95px;
  right: 20px;
  width: 56px;
  height: 56px;
  background: #25D366;
  color: #fff;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
  cursor: pointer;
  z-index: 1000;
  transition: all 0.3s ease;
  text-decoration: none;
  animation: pulse 2s infinite;
}

.whatsapp-float:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 25px rgba(37, 211, 102, 0.6);
  animation: none;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.5); }
  70% { box-shadow: 0 0 0 12px rgba(37, 211, 102, 0); }
  100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
}

.whatsapp-float svg {
  width: 28px;
  height: 28px;
  fill: #fff;
}

.whatsapp-tooltip {
  position: fixed;
  bottom: 160px;
  right: 20px;
  background: #333;
  color: #fff;
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 12px;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
  white-space: nowrap;
  z-index: 1000;
  font-family: 'Poppins', sans-serif;
}

.whatsapp-float:hover + .whatsapp-tooltip,
.whatsapp-tooltip:hover {
  opacity: 1;
  visibility: visible;
}

.whatsapp-tooltip::after {
  content: '';
  position: absolute;
  bottom: -6px;
  right: 18px;
  border-width: 6px 6px 0;
  border-style: solid;
  border-color: #333 transparent transparent transparent;
}

/* ========== ANIMATIONS ========== */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.hero, .quick-actions, .carousel, .quote, .stats, .no-plan {
  animation: fadeInUp 0.6s ease forwards;
}

.quick-actions { animation-delay: 0.1s; }
.carousel { animation-delay: 0.2s; }
.quote { animation-delay: 0.3s; }
.stats { animation-delay: 0.4s; }
</style>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, deleteField, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRkip46Ql5KhNfuatWAcAxQzgP5VtQ8UY",
  authDomain: "easypay-6bce8.firebaseapp.com",
  projectId: "easypay-6bce8",
  storageBucket: "easypay-6bce8.firebasestorage.app",
  messagingSenderId: "862671358267",
  appId: "1:862671358267:web:b243c7b69840ef918c8f1e",
  measurementId: "G-2FZKDQ47FZ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const plans = [
  { name: "Mini", amount: 5000, daily: 234 },
  { name: "Starter", amount: 10000, daily: 466.7 },
  { name: "Basic", amount: 20000, daily: 933.4 },
  { name: "Premium", amount: 50000, daily: 2166.7 },
  { name: "Gold", amount: 100000, daily: 4333.4 },
  { name: "Elite", amount: 300000, daily: 13000 },
  { name: "Diamond", amount: 500000, daily: 21666.7 },
  { name: "Platinum", amount: 1000000, daily: 43333.4 }
];

async function initAuth() {
  await setPersistence(auth, browserLocalPersistence);

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }

    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);
    if (!snap.exists()) return;

    let data = snap.data();

    // Set username
    const displayName = user.displayName || data.fullname || data.username || "User";
    document.getElementById("username").innerText = displayName;
    document.getElementById("userInitial").innerText = displayName.charAt(0).toUpperCase();

    if (data.investment) {
      await handleDailyCredit(userRef, data);
      const updatedSnap = await getDoc(userRef);
      data = updatedSnap.data();
    }

    updateUI(data);
  });
}

initAuth();

async function handleDailyCredit(userRef, data) {
  const inv = data.investment;
  const now = new Date();
  const start = new Date(inv.startDate.seconds * 1000);
  const lastCredit = inv.lastCreditDate
    ? new Date(inv.lastCreditDate.seconds * 1000)
    : start;

  const totalDays = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  const creditedDays = Math.floor((lastCredit - start) / (1000 * 60 * 60 * 24));
  let daysToCredit = totalDays - creditedDays;

  if (daysToCredit <= 0) return;

  if (totalDays >= inv.duration) {
    daysToCredit = inv.duration - creditedDays;
  }

  const amount = daysToCredit * inv.dailyEarning;

  if (amount > 0) {
    await updateDoc(userRef, {
      balance: (data.balance || 0) + amount,
      "investment.lastCreditDate": serverTimestamp()
    });
  }

  if (totalDays >= inv.duration) {
    await updateDoc(userRef, {
      investment: deleteField(),
      activePlan: null
    });
  }
}

function updateUI(data) {
  document.getElementById("balance").innerText =
    (data.balance || 0).toLocaleString();

  if (!data.investment) {
    document.getElementById("planInfo").innerText = "No Active Plan";
    document.getElementById("investmentSection").innerHTML = `
      <div class="no-plan">
        <div class="no-plan-icon">📈</div>
        <h3>No Active Investment</h3>
        <p>Start earning daily returns by choosing an investment plan.</p>
        <button class="no-plan-btn" onclick="location.href='invest.html'">View Plans</button>
      </div>
    `;
    return;
  }

  const inv = data.investment;
  const now = new Date();
  const start = new Date(inv.startDate.seconds * 1000);
  const daysPassed = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  const progress = Math.min((daysPassed / inv.duration) * 100, 100);

  document.getElementById("planInfo").innerText = inv.planName + " Plan";

  document.getElementById("investmentSection").innerHTML = `
    <div class="section-title">Investment Overview</div>
    <div class="stats">
      <div class="card">
        <div class="card-label">Daily Earnings</div>
        <div class="card-value green">₦${inv.dailyEarning.toLocaleString()}</div>
      </div>
      <div class="card">
        <div class="card-label">Days Progress</div>
        <div class="card-value">${Math.min(daysPassed, inv.duration)} / ${inv.duration}</div>
        <div class="progress-bar">
          <div class="progress" style="width:${progress}%"></div>
        </div>
        <div class="days-text">${progress.toFixed(1)}% completed</div>
      </div>
      <div class="card">
        <div class="card-label">Total Expected</div>
        <div class="card-value">₦${inv.totalExpected.toLocaleString()}</div>
      </div>
      <div class="card">
        <div class="card-label">Amount Invested</div>
        <div class="card-value">₦${inv.amount.toLocaleString()}</div>
      </div>
    </div>
  `;
}

/* CAROUSEL */
const images = document.querySelectorAll(".carousel img");
const dots = document.querySelectorAll(".carousel-dot");
let i = 0;

setInterval(() => {
  images[i].classList.remove("active");
  dots[i].classList.remove("active");
  i = (i + 1) % images.length;
  images[i].classList.add("active");
  dots[i].classList.add("active");
}, 3000);
</script>
