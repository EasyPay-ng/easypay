<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<link rel="icon" type="image/png"
href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1752962852/file_00000000401861f8bf6acb6/favicon.png">

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EasyPay Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#f4fbf6;
  padding-bottom:90px;
}

header{
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.username{
  font-weight:600;
  color:#009f4d;
}

.hero{
  margin:20px;
  background:linear-gradient(90deg,#009f4d,#00c261);
  color:white;
  padding:25px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.hero h1{
  margin:10px 0 5px 0;
  font-size:28px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  margin:20px;
}

.card{
  background:white;
  padding:18px;
  border-radius:14px;
  box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

.progress-bar{
  height:10px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
  margin-top:10px;
}

.progress{
  height:100%;
  background:#009f4d;
}

.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  margin:20px;
}

.actions button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#009f4d;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:15px 0;
  box-shadow:0 -4px 20px rgba(0,0,0,0.05);
}

.bottom-nav div{
  text-align:center;
  font-size:12px;
  color:#777;
}

.bottom-nav .active{
  color:#009f4d;
  font-weight:600;
}
</style>
</head>

<body>

<header>
  <h2>EasyPay</h2>
  <div class="username" id="username">Loading...</div>
</header>

<div class="hero">
  <small>Available Balance</small>
  <h1>₦<span id="balance">0</span></h1>
  <div id="planInfo">No Active Plan</div>
</div>

<div class="stats" id="investmentSection"></div>

<div class="actions">
  <button onclick="location.href='plans.html'">View Plans</button>
  <button>Deposit</button>
  <button>Withdraw</button>
</div>

<div class="bottom-nav">
  <div class="active">🏠<br>Home</div>
  <div onclick="location.href='plans.html'">📦<br>Plans</div>
  <div>💳<br>Wallet</div>
  <div>👤<br>Profile</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  getDoc, 
  updateDoc, 
  deleteField, 
  serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyDRkip46Ql5KhNfuatWAcAxQzgP5VtQ8UY",
  authDomain: "easypay-6bce8.firebaseapp.com",
  projectId: "easypay-6bce8",
  storageBucket: "easypay-6bce8.firebasestorage.app",
  messagingSenderId: "862671358267",
  appId: "1:862671358267:web:b243c7b69840ef918c8f1e",
  measurementId: "G-2FZKDQ47FZ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

setPersistence(auth, browserLocalPersistence);

let userData;
let currentUser;

onAuthStateChanged(auth, async (user) => {

  if(!user){
    window.location.href = "login.html";
    return;
  }

  currentUser = user;
  document.getElementById("username").innerText =
    "Hi, " + (user.displayName || "User");

  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    console.log("User data not found");
    return;
  }

  userData = snap.data();

  await handleDailyCredit(ref);

  updateUI();
});

async function handleDailyCredit(ref){

  if(!userData.investment) return;

  const inv = userData.investment;
  const now = new Date();
  const start = new Date(inv.startDate.seconds * 1000);

  const lastCredit = inv.lastCreditDate
    ? new Date(inv.lastCreditDate.seconds * 1000)
    : start;

  const totalDays = Math.floor((now - start) / (1000*60*60*24));
  const creditedDays = Math.floor((lastCredit - start) / (1000*60*60*24));

  let daysToCredit = totalDays - creditedDays;

  if(daysToCredit <= 0) return;

  if(totalDays >= inv.duration){
    daysToCredit = inv.duration - creditedDays;
  }

  const creditAmount = daysToCredit * inv.dailyEarning;

  if(creditAmount > 0){
    await updateDoc(ref, {
      balance: (userData.balance || 0) + creditAmount,
      "investment.lastCreditDate": serverTimestamp()
    });

    userData.balance += creditAmount;
  }

  if(totalDays >= inv.duration){
    await updateDoc(ref, {
      activePlan: null,
      investment: deleteField()
    });

    userData.activePlan = null;
    userData.investment = null;
  }
}

function updateUI(){

  document.getElementById("balance").innerText =
    (userData.balance || 0).toLocaleString();

  const section = document.getElementById("investmentSection");
  section.innerHTML = "";

  if(!userData.investment){
    document.getElementById("planInfo").innerText = "No Active Plan";
    return;
  }

  const inv = userData.investment;
  const now = new Date();
  const start = new Date(inv.startDate.seconds * 1000);
  const daysPassed = Math.floor((now - start) / (1000*60*60*24));
  const progress = Math.min((daysPassed / inv.duration) * 100, 100);

  document.getElementById("planInfo").innerText =
    inv.planName + " Plan";

  section.innerHTML = `
    <div class="card">
      <strong>Daily Earnings</strong><br>
      ₦${inv.dailyEarning.toLocaleString()}
    </div>
    <div class="card">
      <strong>Days Passed</strong><br>
      ${Math.min(daysPassed, inv.duration)} / ${inv.duration}
      <div class="progress-bar">
        <div class="progress" style="width:${progress}%"></div>
      </div>
    </div>
    <div class="card">
      <strong>Total Expected</strong><br>
      ₦${inv.totalExpected.toLocaleString()}
    </div>
  `;
}

</script>

</body>
</html>
