<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/png" sizes="32x32" href="https://res.cloudinary.com/dq7fpxfbc/image/upload/v1752962852/file_00000000401861f8bf6acb6/favicon.png">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EasyPay — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js" defer></script>
<style>
:root{
  --primary:#00b66d;
  --primary-600:#059c56;
  --bg:#f6fff7;
  --card:#ffffff;
  --muted:#6b7280;
  --shadow: 0 8px 24px rgba(16,24,40,0.06);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:'Poppins',system-ui,Segoe UI,Roboto,Helvetica,Arial;
  background:var(--bg); color:#0f1720; min-height:100vh; display:flex;
  -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
}

/* ---------- SIDEBAR ---------- */
.sidebar {
  position:fixed; left:-300px; top:0; height:100vh; width:300px;
  background:var(--card); box-shadow:2px 0 18px rgba(0,0,0,0.08);
  padding:18px; border-right:1px solid #f0f5f0;
  transition:left .26s ease; overflow-y:auto; z-index:1200;
  display:flex; flex-direction:column;
}
.sidebar.active { left:0; }
.sidebar .close { text-align:right; margin-bottom:6px; cursor:pointer; font-size:18px; color:var(--muted) }
.profile { display:flex; gap:12px; align-items:center; padding:6px 0 14px; border-bottom:1px solid #f2f7f2; }
.avatar { width:52px; height:52px; border-radius:12px; background:linear-gradient(135deg,var(--primary),#1b7a4b); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:18px; flex-shrink:0; overflow:hidden; }
.avatar img{ width:100%; height:100%; object-fit:cover; display:block; border-radius:12px }
.profile-text { flex:1 }
.greeting { font-weight:700; font-size:15px; color:var(--primary); line-height:1 }
.sub { font-size:13px; color:var(--muted); margin-top:4px; line-height:1.15 }
nav.menu { margin-top:14px; flex:1 } nav.menu ul { list-style:none; padding:0; margin:0 } nav.menu li { margin:8px 0; } nav.menu a { display:flex; gap:12px; align-items:center; text-decoration:none; color: #111827; padding:10px 8px; border-radius:10px; transition:background .10s, transform .08s; } nav.menu a:hover { background:var(--primary); color:#fff; transform:translateX(4px); } nav.menu a i.emoji { font-style:normal; width:36px; text-align:center; font-size:18px; } nav.menu a span.label { font-weight:600; }
.note { margin-top:18px; font-size:13px; color:var(--muted) }

/* ---------- MAIN ---------- */
.main { flex:1; margin-left:0; transition:margin-left .26s; width:100%; min-height:100vh; display:flex; flex-direction:column; }
.main.shift { margin-left:300px; }
header { background:linear-gradient(90deg,var(--primary),var(--primary-600)); color:#fff; padding:12px 14px; display:flex; align-items:center; gap:12px; justify-content:space-between; }
.hamburger { font-size:20px; cursor:pointer; color:#fff; display:flex; align-items:center }
.title { font-weight:700; font-size:16px }
.profile-mini { display:flex; align-items:center; gap:10px } .profile-mini img { width:36px; height:36px; border-radius:8px; object-fit:cover }

.container { padding:14px; max-width:1150px; margin:0 auto; width:100% }

.cards { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:14px; margin-bottom:14px; }
.card { background:var(--card); border-radius:10px; padding:14px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:6px; min-height:80px; }
.card .label { color:var(--muted); font-size:13px; }
.card .value { font-weight:800; font-size:20px; color:var(--primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.ref-card { display:flex; gap:10px; align-items:center; justify-content:space-between; padding:12px; border-radius:10px; overflow:hidden; }
.ref-input { background:#f2fff6; border:1px dashed #e6f7ec; padding:8px 10px; border-radius:8px; min-width:0; flex:1; width:100%; max-width:100%; box-sizing:border-box; overflow-x:auto; white-space:nowrap; text-overflow:ellipsis; font-weight:700; color:var(--primary); -webkit-overflow-scrolling:touch; cursor:text; }
.copy-btn { background:var(--primary); color:#fff; border:0; padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:700; min-width:86px; }

.wa { position:fixed; right:16px; bottom:16px; background:#25D366; color:#fff; width:52px; height:52px; border-radius:999px; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(0,0,0,0.12); z-index:1400; text-decoration:none; }

@media (max-width:900px){ .sidebar{ width:86%; left:-100% } .main.shift{ margin-left:0 } .container{ padding:12px } .card .value{ font-size:18px } }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar" aria-hidden="true">
  <div class="close" onclick="toggleSidebar()" aria-label="Close menu"><i class="fas fa-times"></i></div>
  <div class="profile" id="profileBlock">
    <div class="avatar" id="avatar"><span id="avatarInitials">EP</span></div>
    <div class="profile-text">
      <div class="greeting" id="greeting">Good evening</div>
      <div class="sub">Welcome, <strong id="sideUsername">User</strong></div>
    </div>
  </div>
  <nav class="menu" aria-label="EasyPay menu">
    <ul>
      <li><a href="upgrade.html"><i class="emoji">📈</i><span class="label">Upgrade</span></a></li>
      <li><a href="withdraw.html"><i class="emoji">🏧</i><span class="label">Withdraw</span></a></li>
      <li><a href="referral.html"><i class="emoji">👥</i><span class="label">Referrals</span></a></li>
      <li><a href="leaderboard.html"><i class="emoji">🏆</i><span class="label">Leaderboard</span></a></li>
      <li><a href="profile.html"><i class="emoji">🙍‍♂️</i><span class="label">Profile</span></a></li>
      <li><a href="tap.html"><i class="emoji">🤙</i><span class="label">Tap&Earn</span></a></li>
      <li><a href="index.html"><i class="emoji">🚪</i><span class="label">Sign-Out</span></a></li>
    </ul>
  </nav>
  <div class="note">Use the menu to navigate quickly — view your returns log to track daily earnings.</div>
</aside>

<div id="overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:1100;" onclick="toggleSidebar()"></div>

<main class="main" id="main">
<header>
  <div style="display:flex; align-items:center; gap:12px;">
    <div class="hamburger" onclick="toggleSidebar()" aria-label="Open menu"><i class="fas fa-bars"></i></div>
    <div class="title">EasyPay Dashboard</div>
  </div>
</header>

<div class="container">
  <div class="cards">
    <div class="card">
      <div class="label">Main Balance</div>
      <div class="value">₦<span id="balance">0.00</span></div>
    </div>
    <div class="card">
      <div class="label">Active Plan</div>
      <div class="value" id="activePlan">None</div>
    </div>
    <div class="card">
      <div class="label">Daily ROI (%)</div>
      <div class="value" id="dailyRoi">0%</div>
    </div>
    <div class="card">
      <div class="label">Returns Log</div>
      <div style="max-height:200px; overflow-y:auto;">
        <ul id="returnsLog" style="margin:0; padding-left:16px; font-size:13px; color:var(--muted);"></ul>
      </div>
    </div>
  </div>
</div>
</main>

<a class="wa" href="https://wa.me/2348125600222" target="_blank" title="Chat on WhatsApp">
  <i class="fab fa-whatsapp" style="font-size:20px"></i>
</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRkip46Ql5KhNfuatWAcAxQzgP5VtQ8UY",
  authDomain: "easypay-6bce8.firebaseapp.com",
  projectId: "easypay-6bce8",
  storageBucket: "easypay-6bce8.firebasestorage.app",
  messagingSenderId: "862671358267",
  appId: "1:862671358267:web:b243c7b69840ef918c8f1e",
  measurementId: "G-2FZKDQ47FZ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const balanceEl = document.getElementById('balance');
const returnsLogEl = document.getElementById('returnsLog');
const activePlanEl = document.getElementById('activePlan');
const dailyRoiEl = document.getElementById('dailyRoi');
const sideUsernameEl = document.getElementById('sideUsername');

onAuthStateChanged(auth, user => {
  if(!user) return location.href='login.html';
  const uRef = doc(db,'users',user.uid);
  onSnapshot(uRef, snap=>{
    if(!snap.exists()) return;
    const data = snap.data() || {};
    balanceEl.textContent = Number(data.balance||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
    sideUsernameEl.textContent = data.username || user.displayName || 'User';
    activePlanEl.textContent = data.activePlan || 'None';
    dailyRoiEl.textContent = data.dailyRoi ? `${data.dailyRoi}%` : '0%';
    returnsLogEl.innerHTML='';
    const log = data.returnsLog||[];
    log.sort((a,b)=> new Date(b.date)-new Date(a.date));
    for(const entry of log){
      const dt = new Date(entry.date);
      const am = Number(entry.amount||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
      const li = document.createElement('li');
      li.textContent = `${dt.toLocaleDateString()} — ₦${am}`;
      returnsLogEl.appendChild(li);
    }
  })
});

// Sidebar toggle
function toggleSidebar(){
  const sb = document.getElementById('sidebar');
  const main = document.getElementById('main');
  const overlay = document.getElementById('overlay');
  const active = sb.classList.toggle('active');
  main.classList.toggle('shift',active);
  overlay.style.display = active ? 'block' : 'none';
  sb.setAttribute('aria-hidden', !active);
}
window.addEventListener('keydown',e=>{if(e.key==='Escape'){const sb=document.getElementById('sidebar'); if(sb.classList.contains('active')) toggleSidebar();}});
</script>
</body>
</html>
