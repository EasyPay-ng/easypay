<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Deposit Requests</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
    .container { max-width: 980px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; 
                 box-shadow: 0 4px 16px rgba(0,0,0,0.1); transition: box-shadow 0.3s; }
    .container:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
    h2 { color: #2f7a2f; margin: 0 0 12px 0; }
    .summary { margin-bottom: 12px; font-size: 0.9rem; color: #333; }
    .controls { display:flex; gap:8px; align-items:center; margin-bottom: 12px; flex-wrap:wrap; }
    .controls input[type="text"] { padding: 8px; width: 240px; border: 1px solid #ccc; border-radius: 4px; }
    .controls select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; background: #fff; }
    .controls button { padding: 8px 12px; border: none; background: #2f7a2f; color: white; border-radius: 4px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: middle; }
    th { background: #2f7a2f; color: #fff; position: sticky; top: 0; z-index: 1; }
    tbody tr:hover { background: #f0fff0; }
    .action { padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right:4px; }
    .approve { background: #28a745; color: #fff; }
    .reject { background: #dc3545; color: #fff; }
    .delete-proof { background: #b91c1c; color: #fff; }
    .no-data { text-align: center; font-style: italic; color: #666; }
    .thumb { max-width: 84px; max-height: 56px; object-fit:cover; border-radius:6px; border:1px solid #eee; cursor:pointer; }
    .small { font-size: 0.85rem; color: #666; }
    .badge { display:inline-block; padding:4px 8px; border-radius:999px; color:#fff; font-weight:700; font-size:0.75rem; }
    .b-pending { background:#f59e0b; }
    .b-approved { background:#10b981; }
    .b-rejected { background:#ef4444; }

    /* Modal styles */
    .modal { display:none; position: fixed; z-index: 1000; left:0; top:0; width:100%; height:100%; 
             background: rgba(0,0,0,0.6); align-items:center; justify-content:center; }
    .modal-content { background:#fff; padding:20px; border-radius:8px; max-width:400px; width:90%; text-align:center; }
    .modal-buttons { margin-top:12px; display:flex; justify-content:center; gap:12px; }
    .modal-buttons button { flex:1; }
    .lightbox { display:none; position:fixed; z-index:1001; left:0; top:0; width:100%; height:100%; 
                background: rgba(0,0,0,0.85); align-items:center; justify-content:center; cursor:pointer; }
    .lightbox img { max-width:90%; max-height:90%; border-radius:6px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Admin — Deposit Requests</h2>
    <div class="summary" id="summaryText">Loading summary…</div>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search by Ref ID, username, sender, amount…" />
      <button id="searchBtn">Search</button>
      <button id="resetBtn">Reset</button>

      <label for="statusFilter" class="small" style="margin-left:8px">Status:</label>
      <select id="statusFilter">
        <option value="all">All</option>
        <option value="pending" selected>Pending</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
      </select>

      <button id="refreshBtn" style="background:#0b5">Refresh</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Amount</th>
          <th>Sender</th>
          <th>Username</th>
          <th>Ref ID</th>
          <th>Proof</th>
          <th>Date</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="adminTable">
        <tr><td colspan="8" class="no-data">Loading deposits…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Confirmation Modal -->
  <div class="modal" id="confirmModal">
    <div class="modal-content">
      <div id="confirmText"></div>
      <div class="modal-buttons">
        <button id="confirmYes" style="background:#28a745;color:#fff;">Yes</button>
        <button id="confirmNo" style="background:#dc3545;color:#fff;">No</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <img id="lightboxImg" src="" alt="Proof Image"/>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script>
  (function(){
    const ALLOWED_ADMIN_EMAIL = 'easypay27.ng@gmail.com';
    const cfg = {
      apiKey: "AIzaSyDRkip46Ql5KhNfuatWAcAxQzgP5VtQ8UY",
      authDomain: "easypay-6bce8.firebaseapp.com",
      projectId: "easypay-6bce8",
      storageBucket: "easypay-6bce8.appspot.com",
      messagingSenderId: "862671358267",
      appId: "1:862671358267:web:b243c7b69840ef918c8f1e"
    };
    firebase.initializeApp(cfg);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resetBtn = document.getElementById('resetBtn');
    const adminTable = document.getElementById('adminTable');
    const statusFilter = document.getElementById('statusFilter');
    const refreshBtn = document.getElementById('refreshBtn');
    const summaryText = document.getElementById('summaryText');

    const confirmModal = document.getElementById('confirmModal');
    const confirmText = document.getElementById('confirmText');
    const confirmYes = document.getElementById('confirmYes');
    const confirmNo = document.getElementById('confirmNo');

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    let currentUser = null;
    let depositsCache = [];
    let confirmCallback = null;

    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
    function fmtDate(ts){ try { return ts && ts.toDate ? ts.toDate().toLocaleString() : ts && ts.seconds ? new Date(ts.seconds*1000).toLocaleString() : new Date(ts).toLocaleString(); } catch(e){return ''; } }
    function showConfirm(msg, cb){ confirmText.textContent = msg; confirmModal.style.display='flex'; confirmCallback=cb; }
    confirmYes.onclick = () => { confirmModal.style.display='none'; if(confirmCallback) confirmCallback(true); };
    confirmNo.onclick = () => { confirmModal.style.display='none'; if(confirmCallback) confirmCallback(false); };

    lightbox.onclick = () => { lightbox.style.display='none'; lightboxImg.src=''; };

    auth.onAuthStateChanged(async user => {
      if(!user) return;
      currentUser = user;
      if(user.email.toLowerCase() !== ALLOWED_ADMIN_EMAIL.toLowerCase()){
        document.body.innerHTML = '<div style="padding:24px;font-family:Arial,Helvetica,sans-serif">Not authorized</div>';
        return;
      }
      await loadAdmin();
    });

    async function loadAdmin(filter='', status='pending'){
      adminTable.innerHTML='';
      depositsCache=[];
      summaryText.textContent = 'Loading summary…';
      try{
        let snap;
        if(filter) snap = await db.collection('deposits').where('refId','==',filter).get();
        else if(status && status!=='all') snap = await db.collection('deposits').where('status','==',status).orderBy('date','desc').get();
        else snap = await db.collection('deposits').orderBy('date','desc').get();

        snap.forEach(docSnap=> depositsCache.push({id: docSnap.id, ...docSnap.data()}));
        depositsCache.sort((a,b)=> {
          const at = a.date && a.date.seconds ? a.date.seconds*1000 : a.date || 0;
          const bt = b.date && b.date.seconds ? b.date.seconds*1000 : b.date || 0;
          return bt - at;
        });

        if(depositsCache.length===0){
          adminTable.innerHTML='<tr><td colspan="8" class="no-data">No records found.</td></tr>';
          summaryText.textContent='No deposits available.';
          return;
        }

        // summary counts
        const counts = depositsCache.reduce((acc,d)=>{
          const s=(d.status||'pending').toLowerCase();
          acc[s]=(acc[s]||0)+1; return acc;
        },{});
        summaryText.textContent=`Total Pending: ${counts.pending||0}, Approved: ${counts.approved||0}, Rejected: ${counts.rejected||0}`;

        depositsCache.forEach(d=>{
          const proofCell = d.proofUrl ? `<img src="${escapeHtml(d.proofUrl)}" class="thumb" alt="proof"/>` : '—';
          const when = fmtDate(d.date);
          const statusText = (d.status||'pending').toLowerCase();
          const badge = statusText==='approved'? `<span class="badge b-approved">APPROVED</span>` :
                        statusText==='rejected'? `<span class="badge b-rejected">REJECTED</span>` :
                        `<span class="badge b-pending">PENDING</span>`;
          const tr = document.createElement('tr');
          tr.innerHTML=`
            <td>₦${escapeHtml(d.amount||0)}</td>
            <td>${escapeHtml(d.senderName||'')}</td>
            <td>${escapeHtml(d.username||'')}</td>
            <td>${escapeHtml(d.refId||'')}</td>
            <td>${proofCell}</td>
            <td>${escapeHtml(when)}</td>
            <td>${badge}</td>
            <td>
              <button class="action approve">Approve</button>
              <button class="action reject">Reject</button>
              <button class="action delete-proof">Delete Proof</button>
            </td>
          `;
          const approveBtn = tr.querySelector('.approve');
          const rejectBtn = tr.querySelector('.reject');
          const delProofBtn = tr.querySelector('.delete-proof');
          const imgThumb = tr.querySelector('.thumb');

          approveBtn.onclick = ()=> showConfirm(`Approve deposit ₦${d.amount} from ${d.username}?`, ok=> ok && handleApprove(d));
          rejectBtn.onclick = ()=> showConfirm(`Reject deposit ₦${d.amount} from ${d.username}?`, ok=> ok && handleReject(d));
          delProofBtn.onclick = ()=> showConfirm('Delete proof image?', ok=> ok && handleDeleteProof(d));
          if(imgThumb) imgThumb.onclick=()=> { lightboxImg.src=d.proofUrl; lightbox.style.display='flex'; };

          adminTable.appendChild(tr);
        });

      }catch(e){ console.error(e); adminTable.innerHTML='<tr><td colspan="8" class="no-data">Error loading data</td></tr>'; summaryText.textContent='Error loading summary'; }
    }

    async function handleApprove(d){
      try{
        const depositRef = db.collection('deposits').doc(d.id);
        await db.runTransaction(async tx=>{
          const depSnap = await tx.get(depositRef);
          if(!depSnap.exists) throw new Error('Deposit missing');
          if(depSnap.data().processed) throw new Error('Already processed');

          const userRef = db.collection('users').doc(d.userId);
          const userSnap = await tx.get(userRef);
          if(!userSnap.exists) throw new Error('User not found');
          const oldBalance = Number(userSnap.data().balance||0);
          const newBalance = oldBalance + Number(d.amount||0);

          tx.update(userRef, {balance:newBalance});
          tx.update(depositRef, {status:'approved', processed:true, processedBy:currentUser.uid, processedAt: firebase.firestore.FieldValue.serverTimestamp()});
        });
        alert('Deposit approved & user credited.');
        loadAdmin(searchInput.value.trim(), statusFilter.value);
      }catch(e){ alert(e.message||'Error approving'); }
    }

    async function handleReject(d){
      try{
        const reason = prompt('Optional reason for rejection:','')||null;
        const depositRef = db.collection('deposits').doc(d.id);
        await depositRef.update({status:'rejected', processed:true, processedBy:currentUser.uid, processedAt: firebase.firestore.FieldValue.serverTimestamp(), rejectReason:reason});
        alert('Deposit rejected.');
        loadAdmin(searchInput.value.trim(), statusFilter.value);
      }catch(e){ alert(e.message||'Error rejecting'); }
    }

    async function handleDeleteProof(d){
      try{
        const depositRef = db.collection('deposits').doc(d.id);
        await depositRef.update({proofUrl: firebase.firestore.FieldValue.delete(), proofDeleted:true});
        alert('Proof deleted.');
        loadAdmin(searchInput.value.trim(), statusFilter.value);
      }catch(e){ alert(e.message||'Error deleting proof'); }
    }

    searchBtn.onclick = ()=> loadAdmin(searchInput.value.trim(), statusFilter.value);
    resetBtn.onclick = ()=> { searchInput.value=''; statusFilter.value='pending'; loadAdmin('','pending'); };
    refreshBtn.onclick = ()=> loadAdmin(searchInput.value.trim(), statusFilter.value);
    statusFilter.onchange = ()=> loadAdmin(searchInput.value.trim(), statusFilter.value);
  })();
  </script>
</body>
</html>
