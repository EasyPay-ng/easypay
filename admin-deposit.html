<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Deposit Requests</title>

  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; 
                 box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    h2 { color: #2f7a2f; margin-bottom: 12px; }
    .summary { margin-bottom: 12px; font-size: 0.9rem; }
    .controls { display:flex; gap:8px; align-items:center; margin-bottom: 12px; flex-wrap:wrap; }
    .controls input, .controls select, .controls button {
      padding: 8px; border-radius: 4px; border: 1px solid #ccc;
    }
    .controls button { background:#2f7a2f; color:#fff; cursor:pointer; border:none; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border:1px solid #ddd; padding:8px; text-align:left; }
    th { background:#2f7a2f; color:#fff; }
    .no-data { text-align:center; color:#666; font-style:italic; }
    .action { padding:5px 8px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
    .approve { background:#28a745; color:#fff; }
    .reject { background:#dc3545; color:#fff; }
    .delete-proof { background:#b91c1c; color:#fff; }
    .thumb { max-width:80px; max-height:60px; object-fit:cover; cursor:pointer; border-radius:6px; }
    .badge { padding:4px 8px; border-radius:999px; font-size:0.75rem; font-weight:bold; color:#fff; }
    .b-approved { background:#10b981; }
    .b-rejected { background:#ef4444; }
    .b-pending { background:#f59e0b; }
  </style>
</head>

<body>

<div class="container">
  <h2>Admin — Deposit Requests</h2>
  <div class="summary" id="summaryText">Loading summary...</div>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search..." />
    <button id="searchBtn">Search</button>
    <button id="resetBtn">Reset</button>

    <select id="statusFilter">
      <option value="all">All</option>
      <option value="pending" selected>Pending</option>
      <option value="approved">Approved</option>
      <option value="rejected">Rejected</option>
    </select>

    <button id="refreshBtn">Refresh</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Amount</th>
        <th>Sender</th>
        <th>Username</th>
        <th>Ref ID</th>
        <th>Proof</th>
        <th>Date</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="adminTable">
      <tr><td colspan="8" class="no-data">Loading deposits...</td></tr>
    </tbody>
  </table>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
(function(){

  const ALLOWED_ADMIN_EMAIL = "easypay27.ng@gmail.com";

  const firebaseConfig = {
    apiKey: "AIzaSyDRkip46Ql5KhNfuatWAcAxQzgP5VtQ8UY",
    authDomain: "easypay-6bce8.firebaseapp.com",
    projectId: "easypay-6bce8",
    storageBucket: "easypay-6bce8.appspot.com",
    messagingSenderId: "862671358267",
    appId: "1:862671358267:web:b243c7b69840ef918c8f1e"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  const adminTable = document.getElementById("adminTable");
  const summaryText = document.getElementById("summaryText");
  const searchInput = document.getElementById("searchInput");
  const statusFilter = document.getElementById("statusFilter");

  function escapeHtml(text){
    return String(text || "").replace(/[&<>"']/g, m =>
      ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[m])
    );
  }

  function formatDate(date){
    try{
      if(!date) return "";
      if(date.seconds) return new Date(date.seconds*1000).toLocaleString();
      return new Date(date).toLocaleString();
    }catch{ return ""; }
  }

  auth.onAuthStateChanged(user=>{
    if(!user){
      adminTable.innerHTML = `<tr><td colspan="8" class="no-data">Not logged in.</td></tr>`;
      return;
    }

    if(user.email.toLowerCase() !== ALLOWED_ADMIN_EMAIL.toLowerCase()){
      document.body.innerHTML = "<h2 style='padding:20px'>Not authorized</h2>";
      return;
    }

    loadDeposits();
  });

  async function loadDeposits(){

    adminTable.innerHTML = `<tr><td colspan="8" class="no-data">Loading...</td></tr>`;

    try{
      const snapshot = await db.collection("deposits").get();

      if(snapshot.empty){
        adminTable.innerHTML = `<tr><td colspan="8" class="no-data">No deposits found.</td></tr>`;
        summaryText.textContent = "No deposits available.";
        return;
      }

      let deposits = [];
      snapshot.forEach(doc=>{
        deposits.push({ id: doc.id, ...doc.data() });
      });

      const filterText = searchInput.value.toLowerCase();
      const status = statusFilter.value;

      deposits = deposits.filter(d=>{
        const matchesStatus = status === "all" || (d.status||"pending") === status;
        const matchesSearch =
          !filterText ||
          String(d.refId||"").toLowerCase().includes(filterText) ||
          String(d.username||"").toLowerCase().includes(filterText) ||
          String(d.senderName||"").toLowerCase().includes(filterText);
        return matchesStatus && matchesSearch;
      });

      // Sort by date - newest first
      deposits.sort((a,b)=>{
        const at = a.date?.seconds ? a.date.seconds*1000 : 0;
        const bt = b.date?.seconds ? b.date.seconds*1000 : 0;
        return bt - at; // Descending order (newest first)
      });

      const counts = deposits.reduce((acc,d)=>{
        const s = (d.status||"pending");
        acc[s] = (acc[s]||0)+1;
        return acc;
      },{});

      summaryText.textContent =
        `Pending: ${counts.pending||0} | Approved: ${counts.approved||0} | Rejected: ${counts.rejected||0}`;

      if(deposits.length===0){
        adminTable.innerHTML = `<tr><td colspan="8" class="no-data">No matching records.</td></tr>`;
        return;
      }

      adminTable.innerHTML = "";

      deposits.forEach(d=>{
        const tr = document.createElement("tr");

        const statusBadge =
          d.status==="approved"
          ? `<span class="badge b-approved">APPROVED</span>`
          : d.status==="rejected"
          ? `<span class="badge b-rejected">REJECTED</span>`
          : `<span class="badge b-pending">PENDING</span>`;

        // Display username (not email) - fallback to email if username not available
        const displayUsername = d.username || d.userEmail || "Unknown";

        tr.innerHTML = `
          <td>₦${escapeHtml(d.amount)}</td>
          <td>${escapeHtml(d.senderName)}</td>
          <td>${escapeHtml(displayUsername)}</td>
          <td>${escapeHtml(d.refId)}</td>
          <td>${d.proofUrl ? `<img src="${d.proofUrl}" class="thumb">` : "—"}</td>
          <td>${formatDate(d.date)}</td>
          <td>${statusBadge}</td>
          <td>
            <button class="action approve">Approve</button>
            <button class="action reject">Reject</button>
          </td>
        `;

        tr.querySelector(".approve").onclick = async ()=>{
          try {
            // Get user document reference
            const userRef = db.collection("users").doc(d.userId);
            const userDoc = await userRef.get();
            
            let currentBalance = 0;
            if (userDoc.exists) {
              currentBalance = userDoc.data().balance || 0;
            }
            
            const newBalance = currentBalance + parseFloat(d.amount || 0);
            
            // Update deposit status and credit user balance in a batch
            const batch = db.batch();
            
            batch.update(db.collection("deposits").doc(d.id), {
              status: "approved",
              approvedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            batch.update(userRef, {
              balance: newBalance,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            await batch.commit();
            
            loadDeposits();
          } catch (err) {
            console.error("Approval error:", err);
            alert("Failed to approve: " + err.message);
          }
        };

        tr.querySelector(".reject").onclick = async ()=>{
          try {
            await db.collection("deposits").doc(d.id).update({
              status: "rejected",
              rejectedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            loadDeposits();
          } catch (err) {
            console.error("Rejection error:", err);
            alert("Failed to reject: " + err.message);
          }
        };

        adminTable.appendChild(tr);
      });

    }catch(e){
      console.error("REAL ERROR:", e);
      adminTable.innerHTML = `<tr><td colspan="8" class="no-data">${e.message}</td></tr>`;
      summaryText.textContent = "Error loading summary";
    }
  }

  document.getElementById("searchBtn").onclick = loadDeposits;
  document.getElementById("resetBtn").onclick = ()=>{
    searchInput.value="";
    statusFilter.value="pending";
    loadDeposits();
  };
  document.getElementById("refreshBtn").onclick = loadDeposits;
  statusFilter.onchange = loadDeposits;

})();
</script>

</body>
</html>
